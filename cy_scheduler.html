<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>CY Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F0E8;
    --paper-warm: #EDE5D6;
    --paper-warmer: #E5DBC5;
    --card: #FFFFFF;
    --card-tint: #FBF7EF;
    --ink: #1A1614;
    --ink-soft: #4A423B;
    --ink-faint: #8A7F73;
    --rule: #D8CDB8;
    --rule-soft: #EAE0CC;

    --accent: #1E2438;
    --accent-soft: #3A4259;
    --terra: #A0522D;

    --status-ok: #2E5934;
    --status-ok-bg: #DCEAD2;
    --status-warn: #8C5A1C;
    --status-warn-bg: #FCE8C2;
    --status-bad: #8B2914;
    --status-bad-bg: #F4D6CD;
    --status-info: #2A4A6B;
    --status-info-bg: #D6E1EC;

    --shadow-sm: 0 1px 2px rgba(26,22,20,.06);
    --shadow-md: 0 2px 8px rgba(26,22,20,.08);
    --shadow-lg: 0 4px 18px rgba(26,22,20,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(1200px 600px at 90% -10%, rgba(160,82,45,.05), transparent 60%),
      radial-gradient(900px 500px at -10% 100%, rgba(30,36,56,.04), transparent 60%);
    min-height: 100vh;
  }
  body[dir="rtl"] { font-family: 'Tajawal', 'Geist', sans-serif; }
  .ar { font-family: 'Tajawal', sans-serif; }
  .mono { font-family: 'Geist Mono', monospace; font-feature-settings: "tnum" 1; }
  .serif { font-family: 'Fraunces', serif; }

  /* ============== TOP TOOLBAR ============== */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 14px;
    margin: 24px 32px 0;
    box-shadow: var(--shadow-md);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-logo {
    width: 40px; height: 40px;
    background: var(--accent);
    color: var(--paper);
    display: grid; place-items: center;
    border-radius: 10px;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: .05em;
  }
  .brand-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .toolbar-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border: 1px solid var(--rule);
    background: var(--card);
    color: var(--ink);
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--ink); background: var(--card-tint); }
  .btn:active { transform: translateY(1px); }
  .btn .ic { font-size: 14px; opacity: .7; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: #2A3050; border-color: #2A3050; }
  .btn-ghost { border-color: transparent; color: var(--ink-soft); }
  .btn-ghost:hover { background: var(--paper-warm); border-color: var(--rule); }
  .btn-sm { padding: 5px 9px; font-size: 12px; }
  .btn-icon { padding: 6px; width: 30px; height: 30px; justify-content: center; }
  body[dir="rtl"] .btn { font-family: 'Tajawal', sans-serif; }

  .menu-wrap { position: relative; }
  .menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    min-width: 200px;
    padding: 4px;
    display: none;
    z-index: 100;
  }
  body[dir="rtl"] .menu { right: auto; left: 0; }
  .menu.open { display: block; }
  .menu button {
    width: 100%;
    text-align: left;
    background: transparent;
    border: none;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  body[dir="rtl"] .menu button { text-align: right; }
  .menu button:hover { background: var(--paper-warm); }
  .menu button .hint {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: .05em;
  }

  /* ============== TAB NAV ============== */
  .tabs-wrap {
    margin: 16px 32px 0;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 8px;
    box-shadow: var(--shadow-sm);
  }
  .tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tab {
    flex: 0 0 auto;
    padding: 9px 18px;
    border-radius: 8px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-soft);
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  body[dir="rtl"] .tab { font-family: 'Tajawal', sans-serif; }
  .tab:hover { background: var(--paper-warm); }
  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .tab .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
  }
  .tab.active .dot { background: var(--paper); }
  .tab .badge-count {
    background: rgba(0,0,0,.08);
    color: var(--ink-soft);
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 99px;
  }
  .tab.active .badge-count { background: rgba(255,255,255,.2); color: white; }

  /* ============== MAIN CONTENT ============== */
  main { padding: 24px 32px 60px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
  }
  .panel-title-block { display: flex; gap: 14px; align-items: flex-start; }
  .panel-num {
    width: 38px; height: 38px;
    background: var(--ink);
    color: var(--paper);
    display: grid; place-items: center;
    border-radius: 8px;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.015em;
    line-height: 1.1;
  }
  body[dir="rtl"] .panel-title { font-family: 'Tajawal', sans-serif; font-weight: 700; }
  .panel-sub {
    font-size: 13px;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  .panel-stat {
    text-align: right;
    color: var(--ink-faint);
    font-size: 12px;
  }
  body[dir="rtl"] .panel-stat { text-align: left; }
  .panel-stat .num {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-weight: 600;
    color: var(--ink);
    display: block;
    line-height: 1;
    margin-top: 4px;
  }

  /* ============== BLOCK CARDS ============== */
  .level-section {
    margin-top: 28px;
  }
  .level-section:first-child { margin-top: 0; }
  .level-section .block-card { margin-bottom: 14px; }
  .level-section .block-card:last-child { margin-bottom: 0; }

  .block-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 22px;
    box-shadow: var(--shadow-sm);
  }
  .block-card.first-of-level {
    border-top: 3px solid var(--accent);
  }
  .block-head {
    background: var(--paper-warm);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .block-tag {
    width: 40px; height: 28px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 6px;
    display: grid; place-items: center;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    color: var(--ink);
  }
  .block-title-wrap { flex: 1; min-width: 0; }
  .block-title {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.2;
  }
  body[dir="rtl"] .block-title { font-family: 'Tajawal', sans-serif; font-weight: 700; }
  .block-subtitle {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 2px;
    font-weight: 400;
  }
  .block-remove {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--ink-faint);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all .15s;
    font-family: inherit;
  }
  .block-remove:hover {
    background: var(--status-bad-bg);
    color: var(--status-bad);
    border-color: var(--status-bad);
  }
  .level-restore {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--card-tint);
    border: 1px dashed var(--rule);
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .level-restore-lbl {
    font-size: 12px;
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .05em;
  }
  body[dir="rtl"] .level-restore-lbl { font-family: 'Tajawal', sans-serif; }
  .restore-block { font-family: inherit; }
  .block-meta {
    display: flex;
    gap: 18px;
    align-items: center;
    font-size: 12px;
    color: var(--ink-soft);
  }
  .block-meta strong { color: var(--ink); font-weight: 600; }
  .block-meta .status-ok { color: var(--status-ok); font-weight: 600; }
  .block-meta .status-warn { color: var(--status-warn); font-weight: 600; }
  .block-meta .status-bad { color: var(--status-bad); font-weight: 600; }

  .level-group {
    padding: 0;
    border-bottom: 1px solid var(--rule-soft);
  }
  .level-group:last-of-type { border-bottom: none; }
  .level-group-head {
    padding: 8px 20px;
    background: var(--card-tint);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    justify-content: space-between;
  }

  /* ============== SCHEDULE TABLE ============== */
  table.sched {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.sched thead th {
    background: var(--card);
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule);
    font-weight: 500;
  }
  body[dir="rtl"] table.sched thead th { text-align: right; }
  table.sched tbody td {
    padding: 10px 12px;
    border-bottom: 1px dashed var(--rule-soft);
    vertical-align: middle;
  }
  table.sched tbody tr:last-child td { border-bottom: none; }
  table.sched tbody tr:hover { background: var(--card-tint); }
  table.sched tbody tr.has-conflict { background: #FCEEEA; }

  td.code-cell {
    font-family: 'Geist Mono', monospace;
    font-size: 12.5px;
    font-weight: 600;
    white-space: nowrap;
    color: var(--ink);
    width: 100px;
  }
  td.course-cell { min-width: 200px; }
  .course-name {
    font-family: 'Tajawal', sans-serif;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.35;
  }
  td.type-cell { width: 80px; }
  td.day-cell { width: 80px; font-family: 'Geist Mono', monospace; font-size: 12px; }
  td.time-cell { width: 130px; font-family: 'Geist Mono', monospace; font-size: 12px; }
  td.instr-cell { width: 170px; }
  td.status-cell { width: 140px; }
  td.actions-cell { width: 32px; }
  .empty-marker {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--status-warn);
    font-weight: 500;
  }

  /* badges */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .pill.type {
    background: var(--paper-warm);
    color: var(--ink-soft);
    border-color: var(--rule-soft);
    font-family: 'Tajawal', sans-serif;
    font-size: 11.5px;
  }
  .pill.status-scheduled { background: var(--status-ok-bg); color: var(--status-ok); }
  .pill.status-warn { background: var(--status-warn-bg); color: var(--status-warn); }
  .pill.status-bad { background: var(--status-bad-bg); color: var(--status-bad); }
  .pill.status-info { background: var(--status-info-bg); color: var(--status-info); }
  .pill .dot {
    width: 5px; height: 5px;
    background: currentColor;
    border-radius: 50%;
  }

  /* editable selects */
  .edit {
    font-family: inherit;
    font-size: 12px;
    padding: 4px 22px 4px 8px;
    border: 1px solid var(--rule-soft);
    background: var(--card);
    border-radius: 6px;
    color: var(--ink);
    width: 100%;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%238A7F73' fill='none' stroke-width='1.5'/></svg>");
    background-repeat: no-repeat;
    background-position: right 6px center;
  }
  body[dir="rtl"] .edit {
    background-position: left 6px center;
    padding: 4px 8px 4px 22px;
  }
  .edit.empty { border-style: dashed; border-color: var(--status-warn); background-color: #FEFAEB; }
  .edit.conflict { border-color: var(--status-bad); background-color: #FCEEEA; color: var(--status-bad); font-weight: 600; }
  .edit:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  .edit.mono { font-family: 'Geist Mono', monospace; }
  .edit.ar { font-family: 'Tajawal', sans-serif; font-size: 12px; }

  /* Add Section row */
  .add-section-row {
    padding: 10px 20px;
    background: var(--card-tint);
    border-top: 1px dashed var(--rule);
    color: var(--ink-faint);
    font-size: 12px;
    cursor: pointer;
    transition: background .15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .add-section-row:hover { background: var(--paper-warm); color: var(--ink); }

  /* Online special row */
  .online-special {
    background: var(--status-ok-bg);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-top: 1px solid var(--rule);
    flex-wrap: wrap;
    font-size: 12.5px;
  }
  .online-special .code {
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    color: var(--ink);
  }
  .online-special .desc {
    flex: 1;
    color: var(--ink-soft);
  }
  .online-special .ar { color: var(--status-ok); }
  .online-special .meta { font-size: 11px; color: var(--ink-faint); display: inline-flex; gap: 12px; }
  .online-special .ok-tag { color: var(--status-ok); font-weight: 600; }

  /* ============== RULES GRID (CONFLICTS PANEL) ============== */
  .rules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .rule-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
  }
  .rule-card.span-2 { grid-column: span 2; }
  .rule-card .rule-tag {
    position: absolute;
    top: 18px;
    right: 18px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: .04em;
  }
  body[dir="rtl"] .rule-card .rule-tag { right: auto; left: 18px; }
  .rule-card .rule-tag.green { background: var(--status-ok-bg); color: var(--status-ok); }
  .rule-card .rule-tag.red { background: var(--status-bad-bg); color: var(--status-bad); }
  .rule-card .rule-tag.amber { background: var(--status-warn-bg); color: var(--status-warn); }
  .rule-card .rule-tag.gray { background: var(--rule-soft); color: var(--ink-soft); }

  .rule-card h3 {
    font-family: 'Geist', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--ink);
    margin-right: 70px;
  }
  body[dir="rtl"] .rule-card h3 { margin-right: 0; margin-left: 70px; font-family: 'Tajawal', sans-serif; }
  .rule-card p {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  .live-issues {
    margin-top: 24px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    overflow: hidden;
  }
  .live-issues-head {
    padding: 12px 18px;
    background: var(--paper-warm);
    border-bottom: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .live-issues-head h3 {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
  }
  body[dir="rtl"] .live-issues-head h3 { font-family: 'Tajawal', sans-serif; }
  .issue-row {
    padding: 10px 18px;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 12.5px;
  }
  .issue-row:last-child { border-bottom: none; }
  .issue-row .issue-tag {
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .issue-row .issue-tag.r5 { background: var(--status-bad-bg); color: var(--status-bad); }
  .issue-row .issue-tag.r6 { background: var(--status-warn-bg); color: var(--status-warn); }
  .issue-row .issue-tag.r10 { background: var(--status-info-bg); color: var(--status-info); }
  .issue-row .issue-meta {
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
  }
  .issue-row .issue-msg { flex: 1; color: var(--ink-soft); }
  .empty-state {
    padding: 30px 20px;
    text-align: center;
    color: var(--status-ok);
    font-style: italic;
    font-family: 'Fraunces', serif;
    font-size: 15px;
  }

  /* ============== VERSIONS PANEL ============== */
  .versions-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 22px;
  }
  .versions-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .versions-card-head {
    padding: 16px 22px;
    border-bottom: 1px solid var(--rule);
  }
  .versions-card-head h3 {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
  }
  body[dir="rtl"] .versions-card-head h3 { font-family: 'Tajawal', sans-serif; font-weight: 700; }
  .versions-card-head p {
    font-size: 12px;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  table.versions {
    width: 100%;
    border-collapse: collapse;
  }
  table.versions th {
    background: var(--paper-warm);
    padding: 10px 16px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-align: left;
    border-bottom: 1px solid var(--rule);
    font-weight: 500;
  }
  body[dir="rtl"] table.versions th { text-align: right; }
  table.versions td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule-soft);
    font-size: 13px;
    vertical-align: top;
  }
  table.versions tr:last-child td { border-bottom: none; }
  table.versions td.v {
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    width: 80px;
  }
  table.versions td.dt { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--ink-faint); width: 110px; }
  table.versions td.actions { width: 60px; text-align: right; }
  .versions-foot {
    padding: 12px 22px;
    background: var(--card-tint);
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 12px;
    color: var(--ink-faint);
  }

  /* takeaways panel */
  .takeaways {
    padding: 22px;
  }
  .takeaways h3 {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  body[dir="rtl"] .takeaways h3 { font-family: 'Tajawal', sans-serif; }
  .takeaway-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--rule-soft);
  }
  .takeaway-item:last-of-type { border-bottom: none; }
  .takeaway-icon {
    width: 32px; height: 32px;
    background: var(--paper-warm);
    border-radius: 8px;
    display: grid; place-items: center;
    flex-shrink: 0;
    font-size: 14px;
  }
  .takeaway-item h4 { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
  .takeaway-item p { font-size: 12px; color: var(--ink-soft); line-height: 1.5; }

  .goal-banner {
    margin-top: 18px;
    padding: 16px 18px;
    background: var(--status-ok-bg);
    border-radius: 10px;
    display: flex;
    gap: 14px;
    border: 1px solid #C5D8B5;
  }
  .goal-banner .icon { font-size: 22px; }
  .goal-banner h4 {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--status-ok);
    margin-bottom: 3px;
  }
  body[dir="rtl"] .goal-banner h4 { font-family: 'Tajawal', sans-serif; }
  .goal-banner p { font-size: 12px; color: var(--status-ok); opacity: .85; }

  /* ============== INSTRUCTORS / COURSES TABLES ============== */
  table.list {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    border-collapse: separate;
    border-spacing: 0;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  table.list thead th {
    background: var(--paper-warm);
    padding: 12px 16px;
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-align: left;
    border-bottom: 1px solid var(--rule);
    font-weight: 500;
  }
  body[dir="rtl"] table.list thead th { text-align: right; }
  table.list tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule-soft);
    font-size: 13px;
  }
  table.list tbody tr:last-child td { border-bottom: none; }
  table.list tbody tr:hover { background: var(--card-tint); }

  /* load meter */
  .loadmeter {
    width: 140px;
    height: 8px;
    background: var(--rule-soft);
    border-radius: 99px;
    overflow: hidden;
    position: relative;
  }
  .loadmeter .fill {
    height: 100%;
    background: var(--status-ok);
    border-radius: 99px;
    transition: width .3s;
  }
  .loadmeter.under .fill { background: var(--status-warn); }
  .loadmeter.over .fill { background: var(--status-bad); }
  .load-text { font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 500; }

  /* ============== TOAST ============== */
  #toast {
    position: fixed;
    top: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow-lg);
    transform: translateX(120%);
    transition: transform .3s ease;
    z-index: 200;
    max-width: 360px;
  }
  body[dir="rtl"] #toast { right: auto; left: 24px; transform: translateX(-120%); }
  #toast.show { transform: translateX(0) !important; }
  #toast.success { background: var(--status-ok); }
  #toast.error { background: var(--status-bad); }

  /* ============== RESPONSIVE ============== */
  @media (max-width: 1100px) {
    .toolbar, .tabs-wrap, main { margin-left: 16px; margin-right: 16px; padding-left: 16px; padding-right: 16px; }
    .rules-grid { grid-template-columns: 1fr; }
    .rule-card.span-2 { grid-column: span 1; }
    .versions-grid { grid-template-columns: 1fr; }
    .panel-title { font-size: 22px; }
  }
  @media (max-width: 700px) {
    .toolbar { flex-direction: column; gap: 12px; align-items: stretch; }
    .toolbar-actions { flex-wrap: wrap; }
    .panel-head { flex-direction: column; }
    .panel-stat { text-align: left; }
    table.sched { font-size: 12px; }
    td.course-cell { min-width: 140px; }
  }

  /* ============== PRINT ============== */
  @media print {
    @page { margin: 1.2cm; size: A4 landscape; }
    body { background: white; padding: 0; font-size: 11px; }
    .toolbar, .tabs-wrap, .panel-head .panel-stat, .add-section-row,
    td.actions-cell, th.th-actions, #toast, .takeaways, .goal-banner,
    .versions-foot { display: none !important; }
    main { padding: 0; margin: 0; }
    .panel { display: block !important; page-break-after: always; }
    .panel:last-child { page-break-after: auto; }
    .block-card, .versions-card, table.list, .rule-card, .live-issues {
      box-shadow: none !important;
      border: 1px solid #999 !important;
      page-break-inside: avoid;
    }
    .edit { border: none !important; padding: 2px !important; background: transparent !important; }
    .edit::-ms-expand { display: none; }
    .edit { background-image: none !important; padding-right: 2px !important; }
    .panel-title { font-family: 'Fraunces', serif; }
    .print-only { display: block !important; }
  }
  .print-only { display: none; }
</style>
</head>

// ==================== CONFLICT ENGINE ====================
function buildSessions() {
  const sessions = [];
  state.rows.forEach((r, idx) => {
    const days = DAY_EXPAND[r.days] || [];
    [{block:'B1', time:r.b1_time, instr:r.b1_instr},
     {block:'B2', time:r.b2_time, instr:r.b2_instr}].forEach(b => {
       if (!b.time) return;
       const info = slotInfo(b.time);
       if (!info) return;
       days.forEach(d => sessions.push({
         rowIdx: idx, row: r.row, code: r.code, level: r.level,
         block: b.block, day: d, info, instr: b.instr, online: isOnline(r)
       }));
     });
  });
  return sessions;
}
function detectConflicts() {
  const sessions = buildSessions();
  const conflictsByRow = {};
  const list = [];
  for (let i = 0; i < sessions.length; i++) {
    for (let j = i+1; j < sessions.length; j++) {
      const a = sessions[i], b = sessions[j];
      if (a.day !== b.day) continue;
      if (!rangesOverlap(a.info, b.info)) continue;
      if (a.rowIdx === b.rowIdx) continue;
      const sameLevel = a.level && b.level && a.level === b.level && !(a.online || b.online); // R5 + R11
      const sameInstr = a.instr && b.instr && a.instr === b.instr; // R6
      if (!sameLevel && !sameInstr) continue;
      const ruleId = sameLevel ? 'R5' : 'R6';
      const reason_en = sameLevel ? `Level "${a.level}"` : `Instructor "${a.instr}"`;
      const reason_ar = sameLevel ? `المستوى "${a.level}"` : `المدرس "${a.instr}"`;
      [a, b].forEach(s => {
        conflictsByRow[s.rowIdx] = conflictsByRow[s.rowIdx] || new Set();
        conflictsByRow[s.rowIdx].add(s.block);
      });
      list.push({
        rule: ruleId, day: a.day,
        reason_en, reason_ar,
        a: `R${a.row} ${a.code} ${a.block} (${a.info.code})`,
        b: `R${b.row} ${b.code} ${b.block} (${b.info.code})`
      });
    }
  }
  return { conflictsByRow, list };
}
function rowStatus(r, conflictBlocks) {
  // Returns { B1: status, B2: status } per block
  const out = {};
  ['B1','B2'].forEach(blk => {
    const time = blk === 'B1' ? r.b1_time : r.b2_time;
    const instr = blk === 'B1' ? r.b1_instr : r.b2_instr;
    const isLab = r.type === 'عملي';
    if (blk === 'B2' && isLab) { out[blk] = 'na'; return; }
    if (conflictBlocks && conflictBlocks.has(blk)) { out[blk] = 'conflict'; return; }
    if (!r.days && !time && !instr) { out[blk] = 'blank'; return; }
    if (r.days && time && instr) { out[blk] = 'scheduled'; return; }
    if (r.days && time && !instr) { out[blk] = 'missing-instr'; return; }
    if ((r.days || time) && !time) { out[blk] = 'missing-time'; return; }
    if (time && !instr) { out[blk] = 'missing-instr'; return; }
    out[blk] = 'partial';
  });
  return out;
}
function statusPill(s) {
  const map = {
    'scheduled': { en: 'Scheduled', ar: 'مجدول', cls: 'status-scheduled' },
    'missing-instr': { en: 'Missing Instructor', ar: 'مدرس ناقص', cls: 'status-warn' },
    'missing-time': { en: 'Missing Time Slot', ar: 'وقت ناقص', cls: 'status-warn' },
    'conflict': { en: 'Conflict', ar: 'تعارض', cls: 'status-bad' },
    'partial': { en: 'Partial', ar: 'جزئي', cls: 'status-warn' },
    'blank': { en: '—', ar: '—', cls: '' },
    'na': { en: '', ar: '', cls: '' }
  };
  const item = map[s];
  if (!item || s === 'na') return '';
  if (s === 'blank') return `<span style="color:var(--ink-faint)">—</span>`;
  return `<span class="pill ${item.cls}"><span class="dot"></span>${state.lang === 'ar' ? item.ar : item.en}</span>`;
}

// Map Arabic level names → compact English labels
function levelLabel(arLevel, lang) {
  if (!arLevel) return '—';
  const numMap = {
    'الأول':1, 'الثاني':2, 'الثالث':3, 'الرابع':4, 'الخامس':5,
    'السادس':6, 'السابع':7, 'الثامن':8, 'التاسع':9, 'العاشر':10
  };
  const m = arLevel.match(/^(\S+?)(?:\s*\((.+?)\))?$/);
  const base = m ? m[1].trim() : arLevel.trim();
  const suffix = m && m[2] ? m[2].trim() : '';
  const num = numMap[base];
  if (lang === 'ar') return arLevel; // Arabic: native form
  if (num) {
    const sufEN = suffix.includes('الدوليين') ? " (Int'l)"
                : suffix.includes('السعوديين') ? ' (Saudi)'
                : suffix ? ` (${suffix})` : '';
    return `Level ${num}${sufEN}`;
  }
  // dept-named groupings
  if (arLevel.includes('هندسة البرمجيات')) return 'SW Engineering';
  if (arLevel.includes('الذكاء الاصطناعي')) return 'AI Department';
  if (arLevel.includes('العلوم')) return 'CS Department';
  return arLevel; // fallback
}

function blockNumLabel(blockName, lang) {
  const n = blockName === 'B1' ? '1' : '2';
  if (lang === 'ar') return `${tr('block_word')} ${n === '1' ? '١' : '٢'}`;
  return `Block ${n}`;
}

  });

  // Group rows by level (preserve workbook order of first appearance)
  const byLevel = new Map();
  state.rows.forEach((r, idx) => {
    const k = r.level || '—';
    if (!byLevel.has(k)) byLevel.set(k, []);
    byLevel.get(k).push({ ...r, _idx: idx });
  });

  let html = `
    <div class="panel-head">

        <div class="panel-num">1</div>

          <div class="panel-title">${escape(tr('sched_title'))}</div>

      <button class="btn btn-ghost btn-sm" id="btn-reset-edits">↺ ${escape(tr('reset'))}</button>
    </div>
  `;

  // For each level, render Block 1 card, then Block 2 card (if any non-lab rows)
  byLevel.forEach((items, level) => {
    html += `<div class="level-section">`;
    const b1Disabled = state.disabledBlocks.has(`${level}||B1`);
    const b2Disabled = state.disabledBlocks.has(`${level}||B2`);
    const nonLab = items.filter(r => !isLabRow(r));

    if (!b1Disabled) {
      html += renderLevelBlockCard(items, level, 'B1', conflictsByRow, true);
    }
    if (nonLab.length > 0 && !b2Disabled) {
      html += renderLevelBlockCard(items, level, 'B2', conflictsByRow, b1Disabled);
    }

    // restore buttons for any disabled blocks
    const removed = [];
    if (b1Disabled) removed.push('B1');
    if (b2Disabled && nonLab.length > 0) removed.push('B2');
    if (removed.length > 0) {
      html += `<div class="level-restore">
        <span class="level-restore-lbl ar" dir="auto">${escape(state.lang === 'ar' ? level : levelLabel(level, 'en'))}:</span>

      </div>`;

    renderActive();
  });
  $('#btn-reset-edits').addEventListener('click', () => {
    if (!confirm(tr('confirm_reset'))) return;
    state.rows = JSON.parse(JSON.stringify(ORIGINAL));
    toast(tr('reset_done'));
    renderActive();
  });
  $$('#panel-schedule .edit').forEach(s => {
    s.addEventListener('change', e => {
      const idx = +e.target.dataset.idx;
      const field = e.target.dataset.field;
      state.rows[idx][field] = e.target.value;
      renderActive();
    });
  });
  $$('#panel-schedule .clear-row').forEach(b => {
    b.addEventListener('click', e => {
      const btn = e.target.closest('.clear-row');
      const idx = +btn.dataset.idx;
      const blk = btn.dataset.block;
      const r = state.rows[idx];
      if (blk === 'B1') { r.b1_time = ''; r.b1_instr = ''; r.b1_room = ''; }
      else { r.b2_time = ''; r.b2_instr = ''; r.b2_room = ''; }

  $$('#panel-schedule .block-remove').forEach(b => {
    b.addEventListener('click', e => {
      const btn = e.target.closest('.block-remove');
      const level = btn.dataset.level;
      const block = btn.dataset.block;
      const fn = TR[state.lang].confirm_remove_block;
      const msg = typeof fn === 'function' ? fn(level, block) : `Remove ${level} ${block}?`;
      if (!confirm(msg)) return;
      // clear data for affected rows
      state.rows.forEach(r => {
        if ((r.level || '—') !== level) return;
        if (block === 'B1') { r.b1_time = ''; r.b1_instr = ''; r.b1_room = ''; }
        else { r.b2_time = ''; r.b2_instr = ''; r.b2_room = ''; }
      });
      state.disabledBlocks.add(`${level}||${block}`);
      toast(tr('block_removed'));
      renderActive();
    });
  });
  $$('#panel-schedule .restore-block').forEach(b => {
    b.addEventListener('click', e => {

      const block = btn.dataset.block;
      state.disabledBlocks.delete(`${level}||${block}`);

      renderActive();
    });
  });
}

// One card = one (Level, Block) combination
function renderLevelBlockCard(allItems, level, blockName, conflictsByRow, isFirstOfLevel) {
  // Filter to rows that should appear in this block
  const items = blockName === 'B2'
    ? allItems.filter(r => r.type !== 'عملي')   // labs have only B1
    : allItems;

  // Per-card stats
  let sections = 0, confs = 0, unfilled = 0;
  items.forEach(r => {
    const time = blockName === 'B1' ? r.b1_time : r.b2_time;
    if (time) sections++;
    else unfilled++;
    const cset = conflictsByRow[r._idx];
    if (cset?.has(blockName)) confs++;
  });

  const status = confs > 0 ? 'bad' : (unfilled > 0 ? 'warn' : 'ok');
  const statusLabel = confs > 0 ? tr('conflicts')
                    : unfilled > 0 ? tr('status_review')
                    : tr('status_ok');

  // Title format: "Level 3 - Block 1" (with bilingual subtitle on first card per level)
  const sep = state.lang === 'ar' ? ' \u2014 ' : ' \u2014 ';  // em-dash
  const lvlEN = levelLabel(level, 'en');
  const lvlAR = level;
  const blkLabel = blockNumLabel(blockName, state.lang);
  const primaryTitle = state.lang === 'ar'
    ? `${lvlAR}${sep}${blkLabel}`
    : `${lvlEN}${sep}${blkLabel}`;
  const altTitle = state.lang === 'ar' ? lvlEN : lvlAR;

  return `<div class="block-card${isFirstOfLevel ? ' first-of-level' : ''}">

      <div class="block-tag">${blockName}</div>
      <div class="block-title-wrap">

        <div class="block-subtitle ar" dir="auto">${escape(altTitle)}</div>
      </div>
      <div class="block-meta">
        <span><span>${escape(tr('sections'))}:</span> <strong>${sections}</strong></span>
        <span><span>${escape(tr('conflicts'))}:</span> <strong style="color:${confs>0?'var(--status-bad)':'var(--ink)'}">${confs}</strong></span>
        <span><span>${escape(tr('unfilled'))}:</span> <strong style="color:${unfilled>0?'var(--status-warn)':'var(--ink)'}">${unfilled}</strong></span>
        <span><span>${escape(tr('status'))}:</span> <strong class="status-${status}">${escape(statusLabel)}</strong></span>
      </div>
      <button class="block-remove" data-level="${escape(level)}" data-block="${blockName}" title="${escape(tr('remove_block'))}" aria-label="${escape(tr('remove_block'))}">×</button>
    </div>
    <table class="sched">
      <thead><tr>
        <th style="width:90px">${escape(tr('code'))}</th>
        <th>${escape(tr('course'))}</th>
        <th style="width:70px">${escape(tr('type'))}</th>
        <th style="width:80px">${escape(tr('day'))}</th>
        <th style="width:130px">${escape(tr('time'))}</th>
        <th style="width:170px">${escape(tr('instructor'))}</th>
        <th style="width:140px">${escape(tr('status'))}</th>
        <th class="th-actions" style="width:32px"></th>
      </tr></thead>
      <tbody>
        ${items.map(r => renderScheduleRow(r, blockName, conflictsByRow)).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderScheduleRow(r, blockName, conflictsByRow) {
  const idx = r._idx;
  const conf = conflictsByRow[idx] || new Set();
  const time = blockName === 'B1' ? r.b1_time : r.b2_time;
  const instr = blockName === 'B1' ? r.b1_instr : r.b2_instr;
  const timeField = blockName === 'B1' ? 'b1_time' : 'b2_time';
  const instrField = blockName === 'B1' ? 'b1_instr' : 'b2_instr';
  const isConf = conf.has(blockName);

  const status = rowStatus(r, conf)[blockName];

  return `<tr class="${isConf ? 'has-conflict' : ''}">
    <td class="code-cell">${escape(r.code)}</td>
    <td class="course-cell">
      <div class="course-name ar" dir="auto">${escape(r.name) || '<span style="color:var(--ink-faint)">—</span>'}</div>
    </td>

    <td class="day-cell">${daySelect(idx, r.days, r.type)}</td>
    <td class="time-cell">${timeSelect(idx, timeField, time, r.type, isConf)}</td>
    <td class="instr-cell">${instrSelect(idx, instrField, instr)}</td>
    <td class="status-cell">${statusPill(status)}</td>
    <td class="actions-cell">${(time || instr) ? `<button class="btn btn-ghost btn-icon clear-row" data-idx="${idx}" data-block="${blockName}" title="${escape(tr('clear'))}">🗑</button>` : ''}</td>
  </tr>`;
}

function daySelect(idx, val, type) {
  const opts = getDayOptionsFor(type);
  const cls = val ? '' : 'empty';
  let html = `<select class="edit mono ${cls}" data-idx="${idx}" data-field="days"><option value="">—</option>`;
  opts.forEach(o => html += `<option value="${o}" ${o===val?'selected':''}>${o}</option>`);
  if (val && !opts.includes(val)) html += `<option value="${escape(val)}" selected>${escape(val)}</option>`;
  html += '</select>';
  return html;
}
function timeSelect(idx, field, val, type, isConflict) {
  const opts = getSlotOptionsFor(type);
  const cls = isConflict ? 'conflict' : (val ? '' : 'empty');
  let html = `<select class="edit mono ${cls}" data-idx="${idx}" data-field="${field}"><option value="">—</option>`;
  opts.forEach(o => html += `<option value="${o.code}" ${o.code===val?'selected':''}>${o.code}</option>`);
  if (val && !opts.find(o => o.code === val)) html += `<option value="${escape(val)}" selected>${escape(val)}</option>`;
  html += '</select>';
  return html;
}
function instrSelect(idx, field, val) {
  const cls = val ? '' : 'empty';
  let html = `<select class="edit ar ${cls}" data-idx="${idx}" data-field="${field}"><option value="">—</option>`;
  DATA.instructors.forEach(i => html += `<option value="${escape(i)}" ${i===val?'selected':''}>${escape(i)}</option>`);
  if (val && !DATA.instructors.includes(val)) html += `<option value="${escape(val)}" selected>${escape(val)}</option>`;
  html += '</select>';
  return html;
}

// ==================== AUTO-ALLOCATE ====================
function autoAllocate() {
  let allocated = 0;
  for (let i = 0; i < state.rows.length; i++) {
    const r = state.rows[i];
    const slotOpts = getSlotOptionsFor(r.type);
    const dayOpts = getDayOptionsFor(r.type);
    if (!r.days) {
      // pick first day option that allows fill
      for (const d of dayOpts) {
        r.days = d;
        if (!r.b1_time && tryFillBlock(i, 'b1_time', slotOpts)) { allocated++; break; }
        else if (!r.b1_time) r.days = '';
        else break;
      }
    }
    if (r.days && !r.b1_time) {
      if (tryFillBlock(i, 'b1_time', slotOpts)) allocated++;
    }
    if (r.days && r.type !== 'عملي' && !r.b2_time) {
      if (tryFillBlock(i, 'b2_time', slotOpts)) allocated++;
    }
  }
  return allocated;
}
function tryFillBlock(idx, field, slotOpts) {
  const r = state.rows[idx];
  for (const s of slotOpts) {
    r[field] = s.code;
    const { conflictsByRow } = detectConflicts();
    const set = conflictsByRow[idx];
    const blockKey = field.startsWith('b1') ? 'B1' : 'B2';
    if (!set || !set.has(blockKey)) return true;
  }
  r[field] = '';
  return false;
}

// ==================== INSTRUCTORS PANEL ====================
function renderInstructors() {
  // build credit counts from current state
  const map = {}; // instr -> assigned credits
  state.rows.forEach(r => {
    [r.b1_instr, r.b2_instr].forEach((ins, i) => {
      if (!ins) return;
      const time = i === 0 ? r.b1_time : r.b2_time;
      if (!time) return;
      const cr = +(r.credits || 0);
      map[ins] = (map[ins] || 0) + cr;
    });
  });

  const minLoadMap = {}; // from lookup data
  (DATA.instructor_loads || []).forEach(([n, m]) => minLoadMap[n] = m);
  // fall back: assume 12 default
  const allInstr = [...new Set([...DATA.instructors, ...Object.keys(map)])];

  let html = `
    <div class="panel-head">
      <div class="panel-title-block">
        <div class="panel-num">4</div>
        <div>
          <div class="panel-title">${escape(tr('instr_title'))}</div>
          <div class="panel-sub">${escape(tr('instr_sub'))}</div>
        </div>
      </div>
      <div class="panel-stat">
        <div>${escape(tr('instructor'))}</div>
        <span class="num">${allInstr.length}</span>
      </div>
    </div>
    <table class="list">
      <thead><tr>
        <th>${escape(tr('name'))}</th>
        <th style="width:100px">${escape(tr('assigned'))}</th>
        <th style="width:100px">${escape(tr('min_load'))}</th>
        <th style="width:100px">${escape(tr('balance'))}</th>
        <th style="width:200px">${escape(tr('load'))}</th>
      </tr></thead>
      <tbody>`;
  allInstr.sort().forEach(ins => {
    const a = map[ins] || 0;
    const m = minLoadMap[ins] || 12;
    const bal = a - m;
    const pct = Math.min(100, (a / Math.max(m, 1)) * 100);
    const status = a < m ? 'under' : (a > m * 1.3 ? 'over' : 'ok');
    html += `<tr>
      <td class="ar" dir="auto" style="font-family:'Tajawal',sans-serif">${escape(ins)}</td>
      <td class="load-text">${a}</td>
      <td class="load-text" style="color:var(--ink-faint)">${m}</td>
      <td class="load-text" style="color:${bal<0?'var(--status-warn)':bal>3?'var(--status-bad)':'var(--status-ok)'}">${bal>=0?'+':''}${bal}</td>
      <td><div class="loadmeter ${status}"><div class="fill" style="width:${pct}%"></div></div></td>
    </tr>`;
  });
  html += '</tbody></table>';
  $('#panel-instructors').innerHTML = html;
}

// ==================== EXPORT / IMPORT ====================
function buildExportRows() {
  const headers = ['Row','Level','Code','Course','Type','Credits','Days',
                   'B1 Time','B1 Instructor','B1 Room','B2 Time','B2 Instructor','B2 Room'];
  const lines = [headers];
  state.rows.forEach(r => {
    lines.push([r.row, r.level, r.code, r.name, r.type, r.credits ?? '',
                r.days, r.b1_time, r.b1_instr, r.b1_room || '',
                r.b2_time, r.b2_instr, r.b2_room || '']);
  });
  return lines;
}
function downloadFile(filename, content, type) {
  const blob = new Blob(['\uFEFF' + content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
function exportAs(fmt) {
  const lines = buildExportRows();
  if (fmt === 'csv') {
    const csv = lines.map(row => row.map(c => {
      const s = String(c ?? '');
      return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(',')).join('\n');
    downloadFile('CY-Schedule.csv', csv, 'text/csv;charset=utf-8');
    toast(tr('csv_done'));
  } else if (fmt === 'tsv') {
    const tsv = lines.map(row => row.map(c => String(c ?? '').replace(/\t/g,' ')).join('\t')).join('\n');
    downloadFile('CY-Schedule.tsv', tsv, 'text/tab-separated-values;charset=utf-8');
    toast(tr('tsv_done'));
  } else if (fmt === 'tsv-clip') {
    const tsv = lines.map(row => row.map(c => String(c ?? '').replace(/\t/g,' ')).join('\t')).join('\n');
    navigator.clipboard.writeText(tsv).then(
      () => toast(tr('tsv_clip_done'), 'success'),
      () => toast('Copy failed', 'error')
    );
  } else if (fmt === 'json') {
    downloadFile('CY-Schedule.json', JSON.stringify({ rows: state.rows, exportedAt: new Date().toISOString() }, null, 2), 'application/json');
    toast(tr('json_done'));
  }
}
$('#btn-export').addEventListener('click', () => {
  $('#menu-export').classList.toggle('open');
});
document.addEventListener('click', e => {
  if (!e.target.closest('#btn-export') && !e.target.closest('#menu-export'))
    $('#menu-export').classList.remove('open');
});
$$('#menu-export button').forEach(b => b.addEventListener('click', e => {
  exportAs(e.target.closest('button').dataset.fmt);
  $('#menu-export').classList.remove('open');
}));

$('#btn-import').addEventListener('click', () => $('#file-import').click());
$('#file-import').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const txt = ev.target.result;
      let rows;
      if (file.name.endsWith('.json')) {
        rows = JSON.parse(txt).rows;
      } else {
        const sep = file.name.endsWith('.tsv') ? '\t' : ',';
        const lines = txt.replace(/^\uFEFF/, '').split(/\r?\n/).filter(l => l.trim());
        const parsed = lines.map(l => parseLine(l, sep));
        const headers = parsed[0];
        rows = parsed.slice(1).map(p => {
          const o = {};
          headers.forEach((h, i) => o[h] = p[i] || '');
          // map back to internal fields
          return {
            row: +o['Row'] || 0,
            level: o['Level'] || '',
            code: o['Code'] || '',
            name: o['Course'] || '',
            type: o['Type'] || '',
            credits: o['Credits'] || null,
            days: o['Days'] || '',
            b1_time: o['B1 Time'] || '',
            b1_instr: o['B1 Instructor'] || '',
            b1_room: o['B1 Room'] || '',
            b2_time: o['B2 Time'] || '',
            b2_instr: o['B2 Instructor'] || '',
            b2_room: o['B2 Room'] || ''
          };
        });
      }
      if (Array.isArray(rows) && rows.length) {
        state.rows = rows;
        toast(typeof tr('imported') === 'function' ? tr('imported')(rows.length) : `Imported ${rows.length}`, 'success');
        renderActive();
      } else throw new Error('no rows');
    } catch (err) {
      console.error(err);
      toast(tr('import_failed'), 'error');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});
function parseLine(line, sep) {
  // simple CSV/TSV parser supporting quoted fields
  if (sep === '\t') return line.split('\t');
  const out = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === sep) { out.push(cur); cur = ''; }
      else cur += c;
    }
  }
  out.push(cur);
  return out;
}

// ==================== PRINT ====================
$('#btn-print').addEventListener('click', () => {
  // make all panels visible for print
  document.body.classList.add('printing');
  $$('.panel').forEach(p => p.classList.add('active'));

      $$('.panel').forEach(p => p.classList.remove('active'));

});

function applyLang() {
  document.documentElement.lang = state.lang;
  document.documentElement.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  document.body.dir = state.lang === 'ar' ? 'rtl' : 'ltr';

// ==================== TOAST ====================
function toast(msg, kind) {
  const t = $('#toast');
  t.className = '';
  t.textContent = msg;
  if (kind) t.classList.add(kind);
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}
