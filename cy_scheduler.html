<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>CY Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F5F0E8;
    --paper-warm: #EDE5D6;
    --paper-warmer: #E5DBC5;
    --card: #FFFFFF;
    --card-tint: #FBF7EF;
    --ink: #1A1614;
    --ink-soft: #4A423B;
    --ink-faint: #8A7F73;
    --rule: #D8CDB8;
    --rule-soft: #EAE0CC;

    --accent: #1E2438;
    --accent-soft: #3A4259;
    --terra: #A0522D;

    --status-ok: #2E5934;
    --status-ok-bg: #DCEAD2;
    --status-warn: #8C5A1C;
    --status-warn-bg: #FCE8C2;
    --status-bad: #8B2914;
    --status-bad-bg: #F4D6CD;
    --status-info: #2A4A6B;
    --status-info-bg: #D6E1EC;
    --status-mute: #6B6258;
    --status-mute-bg: #ECE4D2;

    --shadow-sm: 0 1px 2px rgba(26,22,20,.06);
    --shadow-md: 0 2px 8px rgba(26,22,20,.08);
    --shadow-lg: 0 4px 18px rgba(26,22,20,.10);

    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(1200px 600px at 90% -10%, rgba(160,82,45,.05), transparent 60%),
      radial-gradient(900px 500px at -10% 100%, rgba(30,36,56,.04), transparent 60%);
    min-height: 100vh;
  }
  body[dir="rtl"] { font-family: 'Tajawal', 'Geist', sans-serif; }
  .mono { font-family: 'Geist Mono', monospace; font-feature-settings: "tnum" 1; }
  .serif { font-family: 'Fraunces', serif; }

  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font: inherit; color: inherit; }
  a { color: var(--accent); }

  /* Focus rings */
  button:focus-visible, select:focus-visible, input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }

  /* ============== TOOLBAR ============== */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 24px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    margin: 20px 24px 0;
    box-shadow: var(--shadow-md);
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-logo {
    width: 40px; height: 40px;
    background: var(--accent);
    color: var(--paper);
    display: grid; place-items: center;
    border-radius: 10px;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: .05em;
  }
  .brand-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .toolbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    transition: background .15s, border-color .15s, transform .05s;
  }
  .btn:hover { background: var(--card-tint); border-color: var(--ink-faint); }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--accent);
    color: var(--paper);
    border-color: var(--accent);
  }
  .btn-primary:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--paper-warm); }
  .btn-icon { padding: 8px; }
  .btn-danger { color: var(--status-bad); }
  .btn-danger:hover { background: var(--status-bad-bg); border-color: var(--status-bad); }
  .btn[disabled] { opacity: .4; cursor: not-allowed; }

  .menu-wrap { position: relative; }
  .menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 180px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    padding: 6px;
    z-index: 20;
    display: none;
  }
  body[dir="rtl"] .menu { right: auto; left: 0; }
  .menu.open { display: block; }
  .menu-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  body[dir="rtl"] .menu-item { text-align: right; }
  .menu-item:hover { background: var(--card-tint); color: var(--ink); }

  /* ============== TABS ============== */
  .tabs {
    display: flex;
    gap: 4px;
    margin: 16px 24px 0;
    padding: 6px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow-x: auto;
  }
  .tab {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-faint);
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .tab:hover { background: var(--card-tint); color: var(--ink-soft); }
  .tab.active {
    background: var(--accent);
    color: var(--paper);
  }
  .tab-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
  }
  .tab.active .tab-dot { background: var(--paper-warm); }
  .tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 18px;
    height: 18px;
    padding: 0 6px;
    border-radius: 9px;
    background: var(--status-bad-bg);
    color: var(--status-bad);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .tab.active .tab-badge { background: var(--paper); color: var(--accent); }
  .tab-badge[data-count="0"] { display: none; }

  /* ============== PANEL ============== */
  .panel-wrap { padding: 16px 24px 60px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .panel-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .panel-title {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .panel-sub {
    font-size: 13px;
    color: var(--ink-faint);
    margin-top: 4px;
  }
  .panel-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ============== EMPTY STATE ============== */
  .empty {
    background: var(--card);
    border: 1px dashed var(--rule);
    border-radius: var(--radius);
    padding: 60px 24px;
    text-align: center;
    color: var(--ink-faint);
  }
  .empty-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .empty-sub { font-size: 13px; margin-bottom: 18px; }

  /* ============== SCHEDULE ============== */
  .level-section {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-sm);
  }
  .level-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule-soft);
    flex-wrap: wrap;
  }
  .level-name {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
  }
  .level-meta {
    font-size: 12px;
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .04em;
  }

  .row-card {
    border: 1px solid var(--rule-soft);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 12px;
    background: var(--card-tint);
    transition: border-color .15s;
  }
  .row-card:last-child { margin-bottom: 0; }
  .row-card.has-conflict { border-color: var(--status-bad); background: #FEF6F2; }

  .row-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .row-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .row-code {
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    color: var(--accent);
    font-size: 14px;
  }
  .row-name { font-size: 14px; color: var(--ink); font-weight: 500; }
  .row-actions { display: flex; gap: 6px; }

  .row-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-label {
    font-size: 11px;
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .field-input,
  .field-select {
    padding: 7px 10px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 6px;
    font-size: 13px;
    color: var(--ink);
    width: 100%;
  }
  .field-input:hover, .field-select:hover { border-color: var(--ink-faint); }
  .field-input.invalid, .field-select.invalid { border-color: var(--status-bad); background: var(--status-bad-bg); }

  .blocks {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }
  @media (max-width: 720px) { .blocks { grid-template-columns: 1fr; } }
  .block {
    border: 1px solid var(--rule-soft);
    border-radius: 6px;
    padding: 10px;
    background: var(--card);
  }
  .block-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .block-name {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ============== STATUS PILL ============== */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    font-family: 'Geist Mono', monospace;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .pill-ok { color: var(--status-ok); background: var(--status-ok-bg); }
  .pill-warn { color: var(--status-warn); background: var(--status-warn-bg); }
  .pill-bad { color: var(--status-bad); background: var(--status-bad-bg); }
  .pill-info { color: var(--status-info); background: var(--status-info-bg); }
  .pill-mute { color: var(--status-mute); background: var(--status-mute-bg); }

  /* ============== CONFLICTS ============== */
  .rules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .rule-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .rule-id {
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 11px;
    color: var(--terra);
    letter-spacing: .08em;
  }
  .rule-title {
    font-weight: 600;
    font-size: 14px;
    margin: 4px 0 6px;
    color: var(--ink);
  }
  .rule-desc { font-size: 12px; color: var(--ink-soft); }

  .issues-list {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .issue {
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .issue:last-child { border-bottom: none; }
  .issue-meta { font-size: 12px; color: var(--ink-faint); font-family: 'Geist Mono', monospace; }
  .issue-text { font-size: 13px; color: var(--ink); flex: 1; min-width: 200px; }

  /* ============== VERSIONS ============== */
  .versions-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .snapshot-form {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 18px;
  }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  .snapshot-list {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .snapshot {
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule-soft);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .snapshot:last-child { border-bottom: none; }
  .snapshot.latest { background: var(--card-tint); }
  .snapshot-version {
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    color: var(--accent);
    font-size: 13px;
  }
  .snapshot-info { flex: 1; min-width: 180px; }
  .snapshot-meta { font-size: 12px; color: var(--ink-faint); }
  .snapshot-notes { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

  /* ============== INSTRUCTORS ============== */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table.data {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.data th {
    padding: 12px 14px;
    text-align: left;
    background: var(--paper-warm);
    color: var(--ink-soft);
    font-weight: 600;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--rule);
  }
  body[dir="rtl"] table.data th { text-align: right; }
  table.data td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--rule-soft);
    vertical-align: middle;
  }
  table.data tr:last-child td { border-bottom: none; }
  table.data tr:hover td { background: var(--card-tint); }

  .load-bar {
    height: 8px;
    background: var(--paper-warmer);
    border-radius: 4px;
    overflow: hidden;
    min-width: 80px;
  }
  .load-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width .25s;
  }
  .load-fill-ok { background: var(--status-ok); }
  .load-fill-under { background: var(--status-warn); }
  .load-fill-over { background: var(--status-bad); }

  .add-form {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .add-form .field { flex: 1; min-width: 140px; }

  /* ============== TOAST ============== */
  .toast-stack {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
    pointer-events: none;
  }
  body[dir="rtl"] .toast-stack { right: auto; left: 20px; }
  .toast {
    background: var(--accent);
    color: var(--paper);
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 13px;
    pointer-events: auto;
    animation: toast-in .2s ease-out;
    max-width: 360px;
  }
  .toast.ok { background: var(--status-ok); }
  .toast.bad { background: var(--status-bad); }
  .toast.warn { background: var(--status-warn); }
  @keyframes toast-in {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* ============== MODAL ============== */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26,22,20,.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    max-width: 480px;
    width: 100%;
    overflow: hidden;
  }
  .modal-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--rule-soft);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
  }
  .modal-body { padding: 16px 20px; }
  .modal-foot {
    padding: 12px 20px;
    border-top: 1px solid var(--rule-soft);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    background: var(--card-tint);
  }
  .modal-field { margin-bottom: 12px; }
  .modal-field label {
    display: block;
    font-size: 11px;
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .modal-field input,
  .modal-field textarea,
  .modal-field select {
    width: 100%;
    padding: 8px 10px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 6px;
    font-size: 13px;
    color: var(--ink);
  }
  .modal-field textarea { min-height: 80px; resize: vertical; font-family: inherit; }

  /* ============== PRINT ============== */
  @media print {
    body { background: white; }
    .toolbar, .tabs, .panel-actions, .row-actions, .level-head .btn,
    .toast-stack, .modal-backdrop, .add-form, .menu, .snapshot-form { display: none !important; }
    .panel { display: block !important; page-break-after: always; }
    .panel-wrap { padding: 0; }
    .level-section, .rule-card, .issues-list, .table-wrap { box-shadow: none; border-color: #ccc; page-break-inside: avoid; }
    .row-card { background: white; }
    .field-select, .field-input { border: none; background: transparent; padding: 0; }
  }

  /* ============== UTILS ============== */
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .grow { flex: 1; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="toolbar" role="banner">
  <div class="brand">
    <div class="brand-logo" aria-hidden="true">CY</div>
    <div>
      <div class="brand-title" data-i18n="brand_title">CY Schedule</div>
      <div class="brand-sub" data-i18n="brand_sub">Cybersecurity Department · Scheduler</div>
    </div>
  </div>
  <div class="toolbar-actions">
    <button class="btn btn-ghost btn-icon" id="btnUndo" title="Undo" aria-label="Undo">↶</button>
    <button class="btn btn-ghost btn-icon" id="btnRedo" title="Redo" aria-label="Redo">↷</button>
    <span style="width:1px; height:20px; background:var(--rule);"></span>
    <button class="btn" id="btnImport" data-i18n="import">Import</button>
    <input type="file" id="fileImport" accept=".csv,.tsv,.json" hidden />
    <div class="menu-wrap">
      <button class="btn" id="btnExport" data-i18n="export">Export ▾</button>
      <div class="menu" id="exportMenu" role="menu">
        <button class="menu-item" data-export="csv">CSV (.csv)</button>
        <button class="menu-item" data-export="tsv">TSV (.tsv)</button>
        <button class="menu-item" data-export="json">JSON (.json)</button>
        <button class="menu-item" data-export="copy">Copy as JSON</button>
      </div>
    </div>
    <button class="btn" id="btnPrint" data-i18n="print">Print</button>
    <button class="btn" id="btnLang" title="Toggle language">EN / ع</button>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="Sections">
  <button class="tab active" role="tab" data-tab="schedule" aria-selected="true">
    <span class="tab-dot"></span><span data-i18n="tab_schedule">Schedule</span>
  </button>
  <button class="tab" role="tab" data-tab="conflicts" aria-selected="false">
    <span class="tab-dot"></span><span data-i18n="tab_conflicts">Conflicts</span>
    <span class="tab-badge" id="conflictBadge" data-count="0">0</span>
  </button>

// ====================================================================
// STORAGE
// ====================================================================

const Storage = {
  loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_STATE);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  },
  saveState() {
    try {
      const data = {
        rows: State.rows,
        instructors: State.instructors,
        lang: State.lang,
      };
      localStorage.setItem(STORAGE_STATE, JSON.stringify(data));

  },

    catch (e) { console.warn('snap save failed', e); }
  },
};

let saveTimer = null;
const debouncedSave = () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => Storage.saveState(), 250);
};

// ====================================================================
// HISTORY (Undo / Redo)
// ====================================================================

const History = {
  snapshot() {
    const s = JSON.stringify({ rows: State.rows, instructors: State.instructors });
    State.history.push(s);
    if (State.history.length > HISTORY_CAP) State.history.shift();
    State.future.length = 0;
    updateHistoryButtons();
  },
  undo() {
    if (State.history.length === 0) return false;
    const current = JSON.stringify({ rows: State.rows, instructors: State.instructors });
    State.future.push(current);
    const prev = State.history.pop();
    const data = JSON.parse(prev);
    State.rows = data.rows;
    State.instructors = data.instructors;
    updateHistoryButtons();
    return true;
  },
  redo() {
    if (State.future.length === 0) return false;
    const current = JSON.stringify({ rows: State.rows, instructors: State.instructors });
    State.history.push(current);
    const next = State.future.pop();
    const data = JSON.parse(next);
    State.rows = data.rows;
    State.instructors = data.instructors;
    updateHistoryButtons();
    return true;
  },
};

function updateHistoryButtons() {
  document.getElementById('btnUndo').disabled = State.history.length === 0;
  document.getElementById('btnRedo').disabled = State.future.length === 0;
}

// Wrap a mutation so that history is recorded and storage is auto-saved.
function mutate(fn) {
  History.snapshot();
  fn();
  debouncedSave();
}

// Like mutate() but coalesces rapid edits (e.g. keystrokes) into a single
// history entry. The first call within the idle window snapshots; later calls
// only update state until the user pauses.
let coalesceTimer = null;
function mutateCoalesced(fn) {
  if (coalesceTimer === null) History.snapshot();
  fn();
  debouncedSave();
  clearTimeout(coalesceTimer);
  coalesceTimer = setTimeout(() => { coalesceTimer = null; }, 600);
}

// ====================================================================
// RULES / CONFLICTS
// ====================================================================

function slotsFor(type) {
  return type === 'lab' ? LAB_SLOTS : LECTURE_SLOTS;
}

function findSlot(type, code) {
  return slotsFor(type).find(s => s.code === code) || null;
}

function rangesOverlap(a, b) {
  return a.start < b.end && b.start < a.end;
}

function expandDays(daysStr) {
  if (!daysStr) return [];
  return daysStr.split(',').map(s => s.trim()).filter(Boolean);
}

// Build flat session list from rows.
function buildSessions() {
  const out = [];
  State.rows.forEach(r => {
    ['b1', 'b2'].forEach(bk => {
      const blk = r[bk];
      if (!blk || !blk.time || !blk.days) return;
      const slot = findSlot(r.type, blk.time);
      if (!slot) return;
      const days = expandDays(blk.days);
      days.forEach(day => {
        out.push({
          rowId: r.id, block: bk, day,
          start: slot.start, end: slot.end,
          level: r.level, type: r.type,
          instr: blk.instr, room: blk.room,
        });
      });
    });
  });
  return out;
}

// Detect conflicts; returns { issues, byBlock } where byBlock maps "rowId|b1" => true.
function detectConflicts() {
  const sessions = buildSessions();
  const issues = [];
  const byBlock = new Set();

  for (let i = 0; i < sessions.length; i++) {
    for (let j = i + 1; j < sessions.length; j++) {
      const a = sessions[i], b = sessions[j];
      if (a.day !== b.day) continue;
      if (!rangesOverlap(a, b)) continue;

      // R5: same level (excluding online)
      if (a.level && a.level === b.level && a.type !== 'online' && b.type !== 'online') {
        issues.push({ rule: 'R5', day: a.day,
          reason: `Level "${a.level}" has overlapping sessions.`,
          a: a.rowId + '|' + a.block, b: b.rowId + '|' + b.block });
        byBlock.add(a.rowId + '|' + a.block);
        byBlock.add(b.rowId + '|' + b.block);
      }
      // R6: same instructor
      if (a.instr && a.instr === b.instr) {
        issues.push({ rule: 'R6', day: a.day,
          reason: `Instructor "${a.instr}" is double-booked.`,
          a: a.rowId + '|' + a.block, b: b.rowId + '|' + b.block });
        byBlock.add(a.rowId + '|' + a.block);
        byBlock.add(b.rowId + '|' + b.block);
      }
      // R7: same room (excluding online)
      if (a.room && a.room === b.room && a.type !== 'online' && b.type !== 'online') {
        issues.push({ rule: 'R7', day: a.day,
          reason: `Room "${a.room}" is double-booked.`,
          a: a.rowId + '|' + a.block, b: b.rowId + '|' + b.block });
        byBlock.add(a.rowId + '|' + a.block);
        byBlock.add(b.rowId + '|' + b.block);
      }
    }
  }
  return { issues, byBlock };
}

function blockStatus(row, blockKey, conflictBlocks) {
  const blk = row[blockKey];
  if (blockKey === 'b2' && row.type === 'lab') return 'na'; // labs single block
  const filled = blk.days || blk.time || blk.instr || blk.room;
  if (!filled) return 'blank';
  if (conflictBlocks.has(row.id + '|' + blockKey)) return 'conflict';
  if (!blk.days) return 'missing-days';
  if (!blk.time) return 'missing-time';
  if (!blk.instr) return 'missing-instr';
  return 'scheduled';
}

const STATUS_LABELS = {

  'scheduled': { key: 'status_scheduled', cls: 'pill-ok' },
  'missing-days': { key: 'status_missing_days', cls: 'pill-warn' },
  'missing-time': { key: 'status_missing_time', cls: 'pill-warn' },
  'missing-instr': { key: 'status_missing_instr', cls: 'pill-warn' },
  'conflict': { key: 'status_conflict', cls: 'pill-bad' },
  'na': { key: 'status_na', cls: 'pill-mute' },
};

// ====================================================================
// UI HELPERS
// ====================================================================

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') {
      node.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k.startsWith('data-')) {
      node.setAttribute(k, v);
    } else if (v === true) node.setAttribute(k, '');
    else if (v !== false && v != null) node.setAttribute(k, v);
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}

function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function toast(msg, kind = '') {
  const stack = document.getElementById('toastStack');
  const t = el('div', { class: 'toast ' + kind }, msg);
  stack.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .2s';
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 220);
  }, 2400);
}

function modal({ title, body, onConfirm, confirmLabel, danger }) {
  const back = document.getElementById('modalBackdrop');
  const head = document.getElementById('modalHead');
  const bodyEl = document.getElementById('modalBody');
  const foot = document.getElementById('modalFoot');
  head.textContent = title || '';
  clear(bodyEl);
  if (typeof body === 'string') bodyEl.innerHTML = body;
  else if (body) bodyEl.appendChild(body);
  clear(foot);
  const cancel = el('button', { class: 'btn', onclick: close }, t('cancel'));
  const ok = el('button', { class: 'btn ' + (danger ? 'btn-danger' : 'btn-primary') },
    confirmLabel || t('save'));
  ok.addEventListener('click', () => {
    const result = onConfirm ? onConfirm() : true;
    if (result !== false) close();
  });
  foot.appendChild(cancel);
  foot.appendChild(ok);
  back.classList.add('open');
  setTimeout(() => ok.focus(), 50);
  function close() { back.classList.remove('open'); }
  back.onclick = (e) => { if (e.target === back) close(); };
}

    n.textContent = t(n.getAttribute('data-i18n'));

function instructorOptions() {
  const names = State.instructors.map(i => i.name);
  // also include any names in rows that are not in the instructor list
  State.rows.forEach(r => {
    [r.b1.instr, r.b2.instr].forEach(n => {
      if (n && !names.includes(n)) names.push(n);
    });
  });
  return names;
}

function levelOptions() {
  const set = new Set();
  State.rows.forEach(r => { if (r.level) set.add(r.level); });
  return Array.from(set);
}

function statusPill(status) {
  const meta = STATUS_LABELS[status];
  return el('span', { class: 'pill ' + meta.cls }, t(meta.key));
}

function renderSchedule() {
  const panel = document.getElementById('panel-schedule');
  clear(panel);

  panel.appendChild(renderPanelHeader({
    title: t('schedule_title'),
    sub: t('schedule_sub'),
    actions: [
      el('button', {
        class: 'btn btn-primary',
        onclick: addRow,
      }, t('add_row')),
    ],
  }));

  if (State.rows.length === 0) {
    panel.appendChild(el('div', { class: 'empty' },
      el('div', { class: 'empty-title' }, t('empty_schedule_title')),
      el('div', { class: 'empty-sub' }, t('empty_schedule_sub')),
      el('button', { class: 'btn btn-primary', onclick: addRow }, t('add_row')),
    ));
    return;
  }

  const { byBlock } = detectConflicts();

  // Group by level
  const groups = new Map();
  State.rows.forEach(r => {
    const k = r.level || '—';
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(r);
  });

  groups.forEach((rows, level) => {
    const section = el('div', { class: 'level-section' });
    section.appendChild(el('div', { class: 'level-head' },
      el('div', {},
        el('div', { class: 'level-name' }, level),
        el('div', { class: 'level-meta' }, `${rows.length} section${rows.length === 1 ? '' : 's'}`),
      ),
    ));
    rows.forEach(r => section.appendChild(renderRowCard(r, byBlock)));
    panel.appendChild(section);
  });
}

function renderPanelHeader({ title, sub, actions }) {
  return el('div', { class: 'panel-header' },
    el('div', {},
      el('div', { class: 'panel-title' }, title),
      sub ? el('div', { class: 'panel-sub' }, sub) : null,
    ),
    el('div', { class: 'panel-actions' }, ...(actions || [])),
  );
}

function renderRowCard(row, conflictBlocks) {
  const hasConflict =
    conflictBlocks.has(row.id + '|b1') || conflictBlocks.has(row.id + '|b2');

  const card = el('div', {
    class: 'row-card' + (hasConflict ? ' has-conflict' : ''),
    'data-row': row.id,
  });

  // Head
  card.appendChild(el('div', { class: 'row-head' },
    el('div', { class: 'row-title' },
      el('span', { class: 'row-code' }, row.code || '—'),
      el('span', { class: 'row-name' }, row.name || ''),
    ),
    el('div', { class: 'row-actions' },
      el('button', { class: 'btn btn-ghost btn-icon', title: t('delete'),
        onclick: () => confirmDeleteRow(row.id) }, '✕'),
    ),
  ));

  // Meta grid
  const grid = el('div', { class: 'row-grid' });
  grid.appendChild(makeField(t('code'), inputField(row, 'code')));
  grid.appendChild(makeField(t('name'), inputField(row, 'name')));
  grid.appendChild(makeField(t('level'), levelField(row)));
  grid.appendChild(makeField(t('type'), typeField(row)));
  grid.appendChild(makeField(t('credits'), numField(row, 'credits')));
  card.appendChild(grid);

  // Blocks
  const blocks = el('div', { class: 'blocks' });
  blocks.appendChild(renderBlock(row, 'b1', conflictBlocks));
  if (row.type !== 'lab') {
    blocks.appendChild(renderBlock(row, 'b2', conflictBlocks));
  } else {
    blocks.appendChild(el('div', { class: 'block', style: 'opacity:.5' },
      el('div', { class: 'block-head' },
        el('span', { class: 'block-name' }, t('block2')),
        statusPill('na'),
      ),
      el('div', { style: 'font-size:12px; color:var(--ink-faint); padding:8px 0;' },
        'Lab uses single block.'),
    ));
  }
  card.appendChild(blocks);

  return card;
}

function makeField(label, input) {
  return el('div', { class: 'field' },
    el('label', { class: 'field-label' }, label),
    input,
  );
}

function inputField(row, key) {
  const inp = el('input', {
    class: 'field-input',
    type: 'text',
    value: row[key] || '',
  });
  inp.addEventListener('input', (e) => {
    mutateCoalesced(() => { row[key] = e.target.value; });
    if (key === 'code' || key === 'name') updateRowHead(row);
  });
  return inp;
}

function numField(row, key) {
  const inp = el('input', {
    class: 'field-input',
    type: 'number',
    min: '0',
    step: '1',
    value: row[key] != null ? row[key] : '',
  });
  inp.addEventListener('input', (e) => {
    mutateCoalesced(() => { row[key] = parseInt(e.target.value, 10) || 0; });
  });
  return inp;
}

function levelField(row) {
  // Use a datalist so users can pick existing or type new
  const wrap = document.createElement('div');
  wrap.style.position = 'relative';
  const inp = el('input', {
    class: 'field-input',
    list: 'level-options',
    value: row.level || '',
  });
  inp.addEventListener('change', (e) => {
    mutate(() => { row.level = e.target.value; });
    renderSchedule(); // regroup
  });
  // Ensure the datalist exists
  let dl = document.getElementById('level-options');
  if (!dl) {
    dl = el('datalist', { id: 'level-options' });
    document.body.appendChild(dl);
  }
  clear(dl);
  levelOptions().forEach(opt => dl.appendChild(el('option', { value: opt })));
  wrap.appendChild(inp);
  return wrap;
}

function typeField(row) {
  const sel = el('select', { class: 'field-select' });
  TYPES.forEach(type => {
    const opt = el('option', { value: type.code }, State.lang === 'ar' ? type.ar : type.en);
    if (row.type === type.code) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => {
      row.type = e.target.value;
      // Reset times if slot codes don't apply
      if (!findSlot(row.type, row.b1.time)) row.b1.time = '';
      if (!findSlot(row.type, row.b2.time)) row.b2.time = '';
      if (row.type === 'lab') {
        row.b2 = { days: '', time: '', instr: '', room: '' };
      }
    });
    renderSchedule();
    updateConflictBadge();
  });
  return sel;
}

function renderBlock(row, blockKey, conflictBlocks) {
  const blk = row[blockKey];
  const status = blockStatus(row, blockKey, conflictBlocks);

  const wrap = el('div', { class: 'block', 'data-block': blockKey });
  wrap.appendChild(el('div', { class: 'block-head' },
    el('span', { class: 'block-name' }, t(blockKey === 'b1' ? 'block1' : 'block2')),
    statusPill(status),
  ));

  const grid = el('div', { class: 'row-grid' });
  grid.appendChild(makeField(t('days'), daysSelect(row, blockKey)));
  grid.appendChild(makeField(t('time'), timeSelect(row, blockKey)));
  grid.appendChild(makeField(t('instructor'), instrSelect(row, blockKey)));
  grid.appendChild(makeField(t('room'), roomInput(row, blockKey)));
  wrap.appendChild(grid);

  // Clear button
  const filled = blk.days || blk.time || blk.instr || blk.room;
  if (filled) {
    wrap.appendChild(el('button', {
      class: 'btn btn-ghost',
      style: 'margin-top:8px; font-size:12px;',
      onclick: () => clearBlock(row, blockKey),
    }, t('clear')));
  }
  return wrap;
}

function daysSelect(row, blockKey) {
  const sel = el('select', { class: 'field-select' });
  DAY_PATTERNS.forEach(p => {
    const opt = el('option', { value: p.code }, p.label);
    if (row[blockKey].days === p.code) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => { row[blockKey].days = e.target.value; });
    refreshAfterEdit(row);
  });
  return sel;
}

function timeSelect(row, blockKey) {
  const sel = el('select', { class: 'field-select' });
  sel.appendChild(el('option', { value: '' }, '—'));
  slotsFor(row.type).forEach(s => {
    const opt = el('option', { value: s.code }, s.code);
    if (row[blockKey].time === s.code) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => { row[blockKey].time = e.target.value; });
    refreshAfterEdit(row);
  });
  return sel;
}

function instrSelect(row, blockKey) {
  const sel = el('select', { class: 'field-select' });
  sel.appendChild(el('option', { value: '' }, '—'));
  instructorOptions().forEach(name => {
    const opt = el('option', { value: name }, name);
    if (row[blockKey].instr === name) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => { row[blockKey].instr = e.target.value; });
    refreshAfterEdit(row);
  });
  return sel;
}

function roomInput(row, blockKey) {
  const inp = el('input', {
    class: 'field-input',
    type: 'text',
    value: row[blockKey].room || '',
    placeholder: '—',
  });
  inp.addEventListener('input', (e) => {
    mutateCoalesced(() => { row[blockKey].room = e.target.value; });
  });
  inp.addEventListener('change', () => refreshAfterEdit(row));
  return inp;
}

// ====================================================================
// SCHEDULE EDIT HELPERS (targeted updates)
// ====================================================================

function updateRowHead(row) {
  const card = document.querySelector(`[data-row="${row.id}"]`);
  if (!card) return;
  const codeEl = card.querySelector('.row-code');
  const nameEl = card.querySelector('.row-name');
  if (codeEl) codeEl.textContent = row.code || '—';
  if (nameEl) nameEl.textContent = row.name || '';
}

// Re-render a single row's status pills + conflict badge counts.
function refreshAfterEdit(row) {
  const { byBlock, issues } = detectConflicts();
  // Update all row cards' conflict styling and pill
  document.querySelectorAll('.row-card').forEach(card => {
    const id = card.getAttribute('data-row');
    const r = State.rows.find(x => x.id === id);
    if (!r) return;
    const has = byBlock.has(id + '|b1') || byBlock.has(id + '|b2');
    card.classList.toggle('has-conflict', has);
    ['b1', 'b2'].forEach(bk => {
      const blockEl = card.querySelector(`[data-block="${bk}"]`);
      if (!blockEl) return;
      const pill = blockEl.querySelector('.pill');
      if (pill) {
        const newPill = statusPill(blockStatus(r, bk, byBlock));
        pill.replaceWith(newPill);
      }
    });
  });
  setConflictBadge(issues.length);
  // Don't re-render the conflicts panel unless it's visible (lazy)
  if (document.getElementById('panel-conflicts').classList.contains('active')) {
    renderConflicts();
  }
}

function setConflictBadge(n) {
  const b = document.getElementById('conflictBadge');
  b.setAttribute('data-count', String(n));
  b.textContent = String(n);
}

function updateConflictBadge() {
  setConflictBadge(detectConflicts().issues.length);
}

// SCHEDULE: CRUD ACTIONS

function addRow() {
  mutate(() => { State.rows.push(newRow()); });
  renderSchedule();
  updateConflictBadge();
}

function confirmDeleteRow(id) {
  modal({
    title: t('confirm_delete_row'),
    body: '',
    confirmLabel: t('delete'),
    danger: true,
    onConfirm: () => {
      mutate(() => { State.rows = State.rows.filter(r => r.id !== id); });
      renderSchedule();
      updateConflictBadge();
    },
  });
}

function clearBlock(row, blockKey) {
  mutate(() => {
    row[blockKey] = { days: '', time: '', instr: '', room: '' };
  });
  renderSchedule();
  updateConflictBadge();
}

function renderConflicts() {
  const panel = document.getElementById('panel-conflicts');
  clear(panel);
  panel.appendChild(renderPanelHeader({
    title: t('conflicts_title'),
    sub: t('conflicts_sub'),
  }));

  // Rules
  panel.appendChild(el('h3', {
    style: 'font-family:Fraunces,serif; font-size:14px; font-weight:600; margin-bottom:10px; color:var(--ink-soft);',
  }, t('rules_heading')));

  const rulesGrid = el('div', { class: 'rules-grid' });
  RULES.forEach(rule => {
    rulesGrid.appendChild(el('div', { class: 'rule-card' },
      el('div', { class: 'rule-id' }, rule.id),
      el('div', { class: 'rule-title' }, State.lang === 'ar' ? rule.ar : rule.en),
    ));
  });
  panel.appendChild(rulesGrid);

  // Live issues
  const { issues } = detectConflicts();
  panel.appendChild(el('h3', {
    style: 'font-family:Fraunces,serif; font-size:14px; font-weight:600; margin:24px 0 10px; color:var(--ink-soft);',

  if (issues.length === 0) {
    panel.appendChild(el('div', { class: 'empty' },
      el('div', { class: 'empty-title' }, t('no_conflicts')),
    ));

    return;
  }

  const list = el('div', { class: 'issues-list' });
  issues.slice(0, 100).forEach(iss => {
    list.appendChild(el('div', { class: 'issue' },
      el('span', { class: 'pill pill-bad' }, iss.rule),
      el('span', { class: 'issue-meta' }, `Day ${iss.day}`),
      el('span', { class: 'issue-text' }, iss.reason),
    ));
  });
  panel.appendChild(list);
  setConflictBadge(issues.length);
}

// ====================================================================
// RENDER: VERSIONS
// ====================================================================

function renderVersions() {
  const panel = document.getElementById('panel-versions');
  clear(panel);
  panel.appendChild(renderPanelHeader({
    title: t('versions_title'),
    sub: t('versions_sub'),
  }));

  // Snapshot form
  const reviewer = el('input', { type: 'text', placeholder: t('snap_reviewer') });
  const notes = el('textarea', { placeholder: t('snap_notes') });
  const form = el('div', { class: 'snapshot-form' },
    el('div', { class: 'form-row' },
      el('div', { class: 'modal-field' },
        el('label', {}, t('snap_reviewer')), reviewer,
      ),
      el('div', { class: 'modal-field' },
        el('label', {}, t('snap_notes')), notes,
      ),
    ),
    el('button', {
      class: 'btn btn-primary',
      onclick: () => {
        const r = (reviewer.value || '').trim() || '—';
        const n = (notes.value || '').trim();
        createSnapshot(r, n);
        reviewer.value = ''; notes.value = '';
      },
    }, t('snap_save')),
  );
  panel.appendChild(form);
  panel.appendChild(el('div', { style: 'height:14px;' }));

  if (State.snapshots.length === 0) {
    panel.appendChild(el('div', { class: 'empty' },
      el('div', { class: 'empty-title' }, t('no_snaps')),
    ));
    return;
  }

  const list = el('div', { class: 'snapshot-list' });
  // Show newest first
  const sorted = State.snapshots.slice().reverse();
  sorted.forEach((s, i) => {
    const isLatest = i === 0;
    list.appendChild(el('div', { class: 'snapshot' + (isLatest ? ' latest' : '') },
      el('span', { class: 'snapshot-version mono' }, s.v),
      el('div', { class: 'snapshot-info' },
        el('div', { class: 'snapshot-meta' },
          `${s.date} · ${s.reviewer}` + (isLatest ? ` · ${t('snap_latest')}` : ''),
        ),
        s.notes ? el('div', { class: 'snapshot-notes' }, s.notes) : null,
      ),
      el('button', {
        class: 'btn',
        onclick: () => confirmRestore(s),
      }, t('restore')),
    ));
  });
  panel.appendChild(list);
}

function createSnapshot(reviewer, notes) {
  const v = 'v' + (State.snapshots.length + 1).toString().padStart(3, '0');
  const date = new Date().toISOString().slice(0, 10);
  State.snapshots.push({
    v, reviewer, date, notes,
    rows: JSON.parse(JSON.stringify(State.rows)),
    instructors: JSON.parse(JSON.stringify(State.instructors)),
  });
  Storage.saveSnapshots();
  renderVersions();
  toast(t('snap_created'), 'ok');
}

function confirmRestore(snap) {
  modal({
    title: t('confirm_restore'),
    body: el('div', { style: 'font-size:13px; color:var(--ink-soft);' },
      `${snap.v} · ${snap.date} · ${snap.reviewer}`,
    ),
    confirmLabel: t('restore'),
    onConfirm: () => {
      mutate(() => {
        State.rows = JSON.parse(JSON.stringify(snap.rows));
        State.instructors = JSON.parse(JSON.stringify(snap.instructors || []));
      });
      render();
      toast(t('snap_restored'), 'ok');
    },
  });
}

// ====================================================================
// RENDER: INSTRUCTORS
// ====================================================================

function renderInstructors() {
  const panel = document.getElementById('panel-instructors');
  clear(panel);
  panel.appendChild(renderPanelHeader({
    title: t('instructors_title'),
    sub: t('instructors_sub'),
  }));

  // Add form
  const nameInp = el('input', { class: 'field-input', type: 'text', placeholder: t('instr_name') });
  const minInp = el('input', { class: 'field-input', type: 'number', min: '0', value: '12' });
  const addBtn = el('button', { class: 'btn btn-primary', onclick: () => {
    const name = (nameInp.value || '').trim();
    if (!name) return;
    if (State.instructors.some(i => i.name === name)) { toast('Already exists', 'warn'); return; }
    mutate(() => {
      State.instructors.push({ name, minLoad: parseInt(minInp.value, 10) || 12 });
    });
    nameInp.value = ''; minInp.value = '12';
    renderInstructors();
    renderSchedule();
  }}, t('instr_add'));
  panel.appendChild(el('div', { class: 'add-form' },
    el('div', { class: 'field' }, el('label', { class: 'field-label' }, t('instr_name')), nameInp),
    el('div', { class: 'field', style: 'max-width:140px; flex:0 0 140px;' },
      el('label', { class: 'field-label' }, t('instr_min')), minInp),
    addBtn,
  ));

  // Compute load per instructor
  const loadMap = new Map(); // name -> credits
  State.rows.forEach(r => {
    const credits = parseInt(r.credits, 10) || 0;
    [r.b1.instr, r.b2.instr].forEach(n => {
      if (!n) return;
      loadMap.set(n, (loadMap.get(n) || 0) + credits);
    });
  });

  // Combine declared instructors with any used in rows
  const declared = State.instructors.slice();
  const used = Array.from(loadMap.keys());
  used.forEach(n => {
    if (!declared.some(d => d.name === n)) declared.push({ name: n, minLoad: 12 });
  });

  if (declared.length === 0) {
    panel.appendChild(el('div', { class: 'empty' },
      el('div', { class: 'empty-title' }, t('no_instructors')),
    ));
    return;
  }

  const tbl = el('table', { class: 'data' });
  const thead = el('thead', {}, el('tr', {},
    el('th', {}, t('instr_name')),
    el('th', {}, t('instr_assigned')),
    el('th', {}, t('instr_min')),
    el('th', {}, t('instr_balance')),
    el('th', {}, t('instr_load')),
    el('th', {}, ''),
  ));
  tbl.appendChild(thead);
  const tbody = el('tbody');
  declared.forEach(inst => {
    const assigned = loadMap.get(inst.name) || 0;
    const balance = assigned - inst.minLoad;
    const pct = inst.minLoad ? Math.min(150, Math.round((assigned / inst.minLoad) * 100)) : 0;
    const fill = balance < 0 ? 'load-fill-under' : balance > inst.minLoad * 0.5 ? 'load-fill-over' : 'load-fill-ok';

    const tr = el('tr', {},
      el('td', {}, inst.name),
      el('td', { class: 'mono' }, String(assigned)),
      el('td', { class: 'mono' }, String(inst.minLoad)),
      el('td', { class: 'mono' }, (balance >= 0 ? '+' : '') + balance),
      el('td', {},
        el('div', { class: 'load-bar' },
          el('div', { class: 'load-bar-fill ' + fill, style: `width:${Math.min(100, pct)}%;` }),
        ),
      ),
      el('td', {},
        el('button', { class: 'btn btn-ghost btn-icon', title: t('delete'),
          onclick: () => removeInstructor(inst.name) }, '✕'),
      ),
    );
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  panel.appendChild(el('div', { class: 'table-wrap' }, tbl));
}

function removeInstructor(name) {
  modal({
    title: t('delete') + '?',
    body: el('div', {}, name),
    confirmLabel: t('delete'),
    danger: true,
    onConfirm: () => {
      mutate(() => {
        State.instructors = State.instructors.filter(i => i.name !== name);
      });
      renderInstructors();
      renderSchedule();
    },
  });
}

// ====================================================================
// IMPORT / EXPORT
// ====================================================================

const EXPORT_HEADERS = [
  'code', 'name', 'level', 'type', 'credits',
  'b1_days', 'b1_time', 'b1_instr', 'b1_room',
  'b2_days', 'b2_time', 'b2_instr', 'b2_room',
];

function rowsAsTable() {
  return State.rows.map(r => ({
    code: r.code, name: r.name, level: r.level, type: r.type, credits: r.credits,
    b1_days: r.b1.days, b1_time: r.b1.time, b1_instr: r.b1.instr, b1_room: r.b1.room,
    b2_days: r.b2.days, b2_time: r.b2.time, b2_instr: r.b2.instr, b2_room: r.b2.room,
  }));
}

function escapeCSV(v, sep) {
  if (v == null) return '';
  const s = String(v);
  if (s.includes(sep) || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function toCSV(sep) {
  const rows = rowsAsTable();
  const lines = [EXPORT_HEADERS.map(h => escapeCSV(h, sep)).join(sep)];
  rows.forEach(r => {
    lines.push(EXPORT_HEADERS.map(h => escapeCSV(r[h], sep)).join(sep));
  });
  return lines.join('\n');
}

function download(filename, content, mime) {
  const blob = new Blob(['﻿' + content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

function exportAs(fmt) {
  const stamp = new Date().toISOString().slice(0, 10);
  if (fmt === 'csv') {
    download(`cy_schedule_${stamp}.csv`, toCSV(','), 'text/csv');
    toast(t('exported'), 'ok');
  } else if (fmt === 'tsv') {
    download(`cy_schedule_${stamp}.tsv`, toCSV('\t'), 'text/tab-separated-values');
    toast(t('exported'), 'ok');
  } else if (fmt === 'json') {
    const payload = { rows: State.rows, instructors: State.instructors, exportedAt: new Date().toISOString() };
    download(`cy_schedule_${stamp}.json`, JSON.stringify(payload, null, 2), 'application/json');
    toast(t('exported'), 'ok');
  } else if (fmt === 'copy') {
    const payload = { rows: State.rows, instructors: State.instructors };
    navigator.clipboard.writeText(JSON.stringify(payload, null, 2))
      .then(() => toast(t('copied'), 'ok'))
      .catch(() => toast('Copy failed', 'bad'));
  }
}

function parseCSV(text, sep) {
  // Minimal CSV parser supporting quoted fields with embedded sep/newlines.
  const rows = [];
  let cur = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQ = false;
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === sep) { cur.push(field); field = ''; }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field || cur.length) { cur.push(field); rows.push(cur); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].length));
}

function importFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = String(e.target.result || '').replace(/^﻿/, '');
    let imported = [];
    let importedInstr = null;
    try {
      if (file.name.endsWith('.json')) {
        const data = JSON.parse(text);
        const arr = Array.isArray(data) ? data : data.rows;
        imported = (arr || []).map(normalizeImportedRow);
        if (data.instructors) importedInstr = data.instructors;
      } else {
        const sep = file.name.endsWith('.tsv') ? '\t' : ',';
        const rows = parseCSV(text, sep);
        if (!rows.length) throw new Error('Empty file');
        const headers = rows[0].map(h => h.trim().toLowerCase());
        imported = rows.slice(1).map(cols => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
          return normalizeImportedRow(obj);
        });
      }
      mutate(() => {
        State.rows = imported;
        if (importedInstr) State.instructors = importedInstr;
      });
      render();
      toast(`${t('imported')}: ${imported.length}`, 'ok');
    } catch (err) {
      console.error(err);
      toast('Import failed: ' + err.message, 'bad');
    }
  };
  reader.readAsText(file);
}

function normalizeImportedRow(obj) {
  return {
    id: newId(),
    code: obj.code || '',
    name: obj.name || '',
    level: obj.level || '',
    type: ['lecture','lab','online'].includes(obj.type) ? obj.type : 'lecture',
    credits: parseInt(obj.credits, 10) || 0,
    b1: {
      days: obj.b1_days || '', time: obj.b1_time || '',
      instr: obj.b1_instr || '', room: obj.b1_room || '',
    },
    b2: {
      days: obj.b2_days || '', time: obj.b2_time || '',
      instr: obj.b2_instr || '', room: obj.b2_room || '',
    },
  };
}

// ====================================================================
// TABS
// ====================================================================

function setTab(name) {
  document.querySelectorAll('.tab').forEach(t => {
    const isActive = t.getAttribute('data-tab') === name;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  // Re-render the conflicts panel on activation so it reflects latest edits
  if (name === 'conflicts') renderConflicts();
  if (name === 'instructors') renderInstructors();
  if (name === 'courses') renderCourses();
  if (name === 'versions') renderVersions();
}

// ====================================================================
// LANGUAGE
// ====================================================================

function setLang(l) {
  State.lang = l;
  document.body.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = l;
  Storage.saveState();
  render();
}

// ====================================================================
// INIT
// ====================================================================

function init() {
  // Load persisted state
  const saved = Storage.loadState();
  if (saved) {
    State.rows = (saved.rows || []).map(r => {
      // Ensure id exists for legacy rows
      if (!r.id) r.id = newId();
      // Ensure block objects exist
      r.b1 = r.b1 || { days: '', time: '', instr: '', room: '' };
      r.b2 = r.b2 || { days: '', time: '', instr: '', room: '' };
      return r;
    });
    State.instructors = saved.instructors || [];
    State.lang = saved.lang || 'en';
  }
  State.snapshots = Storage.loadSnapshots();
  document.body.dir = State.lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = State.lang;

  // Tab clicks
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => setTab(tab.getAttribute('data-tab')));
  });

  // Toolbar
  document.getElementById('btnLang').addEventListener('click',
    () => setLang(State.lang === 'en' ? 'ar' : 'en'));
  document.getElementById('btnPrint').addEventListener('click', () => window.print());
  document.getElementById('btnUndo').addEventListener('click', () => {
    if (History.undo()) { render(); debouncedSave(); toast('Undo', ''); }
  });
  document.getElementById('btnRedo').addEventListener('click', () => {
    if (History.redo()) { render(); debouncedSave(); toast('Redo', ''); }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    const meta = e.metaKey || e.ctrlKey;
    if (meta && e.key === 'z' && !e.shiftKey) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      e.preventDefault();
      if (History.undo()) { render(); debouncedSave(); }
    } else if (meta && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      e.preventDefault();
      if (History.redo()) { render(); debouncedSave(); }
    }
  });

  // Export menu
  const menu = document.getElementById('exportMenu');
  document.getElementById('btnExport').addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', () => menu.classList.remove('open'));
  menu.querySelectorAll('[data-export]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      exportAs(b.getAttribute('data-export'));
      menu.classList.remove('open');
    });
  });

  // Import
  document.getElementById('btnImport').addEventListener('click',
    () => document.getElementById('fileImport').click());
  document.getElementById('fileImport').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importFile(f);
    e.target.value = '';
  });

  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
</body>
</html>
