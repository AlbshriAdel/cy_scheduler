// =============================================================
// XLSX WRITER (single-file, no deps).
// Produces an Office Open XML spreadsheet using STORE compression
// (zip uncompressed) — Excel reads it identically.
// =============================================================

const _crc32_table = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[n] = c >>> 0;
  }
  return t;
})();
function crc32(bytes) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i++) c = _crc32_table[(c ^ bytes[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}
const _enc = new TextEncoder();

// files: [{ name, data: Uint8Array, method?: 0|8, crc?, uncSize? }]
//   method=0 (STORE): we compute crc; data length is both compressed and
//     uncompressed size.
//   method=8 (DEFLATE): caller supplies precomputed crc and uncSize so
//     pre-compressed bytes from the template pass through verbatim.
function makeZip(files) {
  const local = [];
  const central = [];
  let offset = 0;
  files.forEach(f => {
    const method = f.method == null ? 0 : f.method;
    const nameBytes = _enc.encode(f.name);
    const crc = method === 0 ? crc32(f.data) : f.crc;
    const compSize = f.data.length;
    const uncSize = method === 0 ? f.data.length : f.uncSize;
    const lh = new Uint8Array(30 + nameBytes.length);
    const dv = new DataView(lh.buffer);
    dv.setUint32(0, 0x04034b50, true);
    dv.setUint16(4, 20, true);
    dv.setUint16(6, 0, true);
    dv.setUint16(8, method, true);
    dv.setUint16(10, 0, true);
    dv.setUint16(12, 0x21, true);
    dv.setUint32(14, crc, true);
    dv.setUint32(18, compSize, true);
    dv.setUint32(22, uncSize, true);
    dv.setUint16(26, nameBytes.length, true);
    dv.setUint16(28, 0, true);
    lh.set(nameBytes, 30);
    local.push(lh, f.data);

    const ch = new Uint8Array(46 + nameBytes.length);
    const dv2 = new DataView(ch.buffer);
    dv2.setUint32(0, 0x02014b50, true);
    dv2.setUint16(4, 20, true);
    dv2.setUint16(6, 20, true);
    dv2.setUint16(8, 0, true);
    dv2.setUint16(10, method, true);
    dv2.setUint16(12, 0, true);
    dv2.setUint16(14, 0x21, true);
    dv2.setUint32(16, crc, true);
    dv2.setUint32(20, compSize, true);
    dv2.setUint32(24, uncSize, true);
    dv2.setUint16(28, nameBytes.length, true);
    dv2.setUint32(42, offset, true);
    ch.set(nameBytes, 46);
    central.push(ch);

    offset += lh.length + compSize;
  });

  let centralSize = 0;
  central.forEach(c => centralSize += c.length);
  const cdOffset = offset;

  const eocd = new Uint8Array(22);
  const dvE = new DataView(eocd.buffer);
  dvE.setUint32(0, 0x06054b50, true);
  dvE.setUint16(8, files.length, true);
  dvE.setUint16(10, files.length, true);
  dvE.setUint32(12, centralSize, true);
  dvE.setUint32(16, cdOffset, true);

  const total = offset + centralSize + 22;
  const out = new Uint8Array(total);
  let pos = 0;
  local.forEach(l => { out.set(l, pos); pos += l.length; });
  central.forEach(c => { out.set(c, pos); pos += c.length; });
  out.set(eocd, pos);
  return out;
}

function xmlEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function colLetter(n) {
  let s = '';
  while (n > 0) { const r = (n - 1) % 26; s = String.fromCharCode(65 + r) + s; n = Math.floor((n - 1) / 26); }
  return s;
}

// rows: array of arrays of values (string|number)
function sheetXml(rows) {
  const lines = [];
  lines.push('<?xml version="1.0" encoding="UTF-8" standalone="yes"?>');
  lines.push('<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">');
  lines.push('<sheetData>');
  rows.forEach((cells, r) => {
    lines.push(`<row r="${r + 1}">`);
    cells.forEach((v, c) => {
      const ref = colLetter(c + 1) + (r + 1);
      if (typeof v === 'number' && Number.isFinite(v)) {
        lines.push(`<c r="${ref}"><v>${v}</v></c>`);
      } else if (v == null || v === '') {
        // skip empty
      } else {
        lines.push(`<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${xmlEscape(v)}</t></is></c>`);
      }
    });
    lines.push('</row>');
  });
  lines.push('</sheetData>');
  lines.push('</worksheet>');
  return lines.join('');
}

function buildWorkbook(sheets) {
  // sheets: [{name, rows}]
  const types = [
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>',
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">',
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>',
    '<Default Extension="xml" ContentType="application/xml"/>',
    '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>',
  ];
  sheets.forEach((_, i) => {
    types.push(`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`);
  });
  types.push('</Types>');

  const rootRels = [
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>',
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">',
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>',
    '</Relationships>',
  ];

  const wbRels = [
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>',
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">',
  ];
  sheets.forEach((_, i) => {
    wbRels.push(`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`);
  });
  wbRels.push('</Relationships>');

  const wb = [
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>',
    '<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">',
    '<sheets>',
  ];
  sheets.forEach((s, i) => {
    wb.push(`<sheet name="${xmlEscape(s.name).slice(0, 31)}" sheetId="${i+1}" r:id="rId${i+1}"/>`);
  });
  wb.push('</sheets></workbook>');

  const files = [
    { name: '[Content_Types].xml', data: _enc.encode(types.join('')) },
    { name: '_rels/.rels', data: _enc.encode(rootRels.join('')) },
    { name: 'xl/workbook.xml', data: _enc.encode(wb.join('')) },
    { name: 'xl/_rels/workbook.xml.rels', data: _enc.encode(wbRels.join('')) },
  ];
  sheets.forEach((s, i) => {
    files.push({
      name: `xl/worksheets/sheet${i+1}.xml`,
      data: _enc.encode(sheetXml(s.rows)),
    });
  });

  return makeZip(files);
}

// Build the full department timetable in the layout of
// Course_Schedule_Template.xlsx (the bilingual reference template
// supplied by the user). Layout:
//   Row 1: title
//   Row 3: BLOCK 1 / BLOCK 2 super-headers
//   Row 4: column headers (bilingual EN \n AR)
//   Row 5+: one row per section (Block 1 cols G-I, Block 2 cols J-L)
// Plus an extra Grid sheet for the weekly view.
// =============================================================
// Course_Schedule_Template.xlsx export (preserves the exact
// design + coloring of the template; only the data rows are filled
// in). The template's other parts (styles, theme, sharedStrings,
// workbook, etc.) are passed through verbatim from embedded bytes.
// =============================================================

function _b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// The template's data row 5 cell style indices (looked up from the
// extracted sheet1.xml of Course_Schedule_Template.xlsx).
//   First line of a level group:    [9,10,11,10,10,12,13,14,10,15,14,10]
//   Following lines (same level):   [9,17,18,17,17,19,20,21,17,22,21,17]
//                                   alternating with
//                                   [9,10,11,10,10,16,23,14,10,15,14,10]
// Last line (thickBot) of group:    [38..44 etc.] — we use a closer
// row pattern to keep it simple and readable.
function _buildSheet1Xml(prefix, suffix) {
  const lines = [];
  // Group rows by level, preserving the order of State.levels then any
  // orphan rows (no level) at the end.
  const groups = [];
  State.levels.forEach(lv => {
    const inLv = State.rows.filter(r => r.levelId === lv.id);
    if (inLv.length) groups.push({ level: lv, rows: inLv });
  });
  const orphans = State.rows.filter(r => !State.levels.some(l => l.id === r.levelId));
  if (orphans.length) groups.push({ level: { name: '' }, rows: orphans });

  // Style patterns (row 5/6/7/8 from the template)
  const STYLE_TOP_ODD  = [9,10,11,10,10,12,13,14,10,15,14,10];
  const STYLE_EVEN     = [9,17,18,17,17,19,20,21,17,22,21,17];
  const STYLE_MID_ODD  = [9,10,11,10,10,16,23,14,10,15,14,10];

  let rNum = 5;
  const merges = ['A1:L1', 'A2:L2', 'G3:I3', 'J3:L3'];

  // Cell renderer
  const cellXml = (col, row, sIdx, value, isNum) => {
    const ref = colLetter(col + 1) + row;
    if (value === '' || value == null) return `<c r="${ref}" s="${sIdx}"/>`;
    if (isNum && typeof value === 'number' && Number.isFinite(value)) {
      return `<c r="${ref}" s="${sIdx}"><v>${value}</v></c>`;
    }
    return `<c r="${ref}" s="${sIdx}" t="inlineStr"><is><t xml:space="preserve">${xmlEscape(value)}</t></is></c>`;
  };

  groups.forEach(g => {
    const lvName = g.level.name || '';
    const startRow = rNum;
    g.rows.forEach((r, idx) => {
      const b1 = r.blocks[0] || { time:'', instr:'', room:'' };
      const b2 = r.blocks[1] || { time:'', instr:'', room:'' };
      const typeLabel = (TYPES.find(t => t.code === r.type) || {}).en || r.type;
      const cells = [
        idx === 0 ? lvName : '',  // A (level name only on first row of group)
        r.code || '',             // B
        r.name || '',             // C
        typeLabel,                // D
        r.credits || 0,           // E
        r.days || '',             // F
        b1.time || '',            // G
        b1.instr || '',           // H
        b1.room || '',            // I
        b2.time || '',            // J
        b2.instr || '',           // K
        b2.room || '',            // L
      ];
      // Pick style pattern: idx=0 → TOP_ODD, even idx → EVEN, odd → MID_ODD
      const styles = idx === 0 ? STYLE_TOP_ODD : (idx % 2 === 1 ? STYLE_EVEN : STYLE_MID_ODD);
      let row = `<row r="${rNum}" spans="1:12" x14ac:dyDescent="0.2">`;
      for (let c = 0; c < 12; c++) {
        row += cellXml(c, rNum, styles[c], cells[c], c === 4);
      }
      row += '</row>';
      lines.push(row);
      rNum++;
    });
    // Merge the level name down the group
    if (g.rows.length > 1 && lvName) {
      merges.push(`A${startRow}:A${startRow + g.rows.length - 1}`);
    }
  });

  const lastRow = Math.max(rNum - 1, 4);
  // Find and replace the dimension reference in the prefix
  const newPrefix = prefix.replace(/<dimension ref="A1:L\d+"\/>/, `<dimension ref="A1:L${lastRow}"/>`);

  // Compose suffix: <mergeCells>...</mergeCells><pageMargins .../></worksheet>
  const mergeCellsXml =
    `<mergeCells count="${merges.length}">` +
    merges.map(m => `<mergeCell ref="${m}"/>`).join('') +
    `</mergeCells>`;
  // Strip any existing mergeCells/conditionalFormatting from suffix; keep
  // only pageMargins through </worksheet>.
  let cleanSuffix = suffix;
  cleanSuffix = cleanSuffix.replace(/<mergeCells[\s\S]*?<\/mergeCells>/, '');
  cleanSuffix = cleanSuffix.replace(/<conditionalFormatting[\s\S]*?<\/conditionalFormatting>/g, '');

  return newPrefix + lines.join('') + '</sheetData>' + mergeCellsXml + cleanSuffix.replace(/^<\/sheetData>/, '');
}

function exportXlsx() {
  const tplEl = document.getElementById('xlsx-template-data');
  if (!tplEl) { toast('Template missing', 'bad'); return; }
  const tpl = JSON.parse(tplEl.textContent);
  const sheet1Xml = _buildSheet1Xml(tpl.prefix, tpl.suffix);

  const files = [];
  // Pass-through for every other file from the original template.
  tpl.others.forEach(o => {
    files.push({
      name: o.name,
      data: _b64ToBytes(o.data),
      method: o.method,
      crc: o.crc,
      uncSize: o.uncSize,
    });
  });
  // Replace sheet1.xml with our generated content (STORE method).
  files.push({
    name: 'xl/worksheets/sheet1.xml',
    data: _enc.encode(sheet1Xml),
  });
  // Sort to roughly match the original layout (cosmetic).
  files.sort((a, b) => a.name.localeCompare(b.name));

  const bytes = makeZip(files);
  const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Course_Schedule_Template.xlsx';
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
  const truncated = State.rows.filter(r => r.blocks.length > 2).length;
  if (truncated) toast(`${truncated} section(s) had >2 blocks — extras dropped to fit template`, 'warn');
}

function exportAs(fmt) {
  if (isDirty()) {
    toast(t('blocked_export'), 'warn');
    return;
  }
  if (fmt === 'xlsx') {
    exportXlsx();
    toast(t('exported') + ' · xlsx', 'ok');
    return;
  }
  const stamp = new Date().toISOString().slice(0, 10);
  if (fmt === 'csv') {
    download(`cy_schedule_${stamp}.csv`, toCSV(','), 'text/csv');
    toast(t('exported'), 'ok');
  } else if (fmt === 'csv-wide') {
    download(`cy_schedule_${stamp}_wide.csv`, toWideCSV(','), 'text/csv');
    toast(t('exported'), 'ok');
  } else if (fmt === 'template') {
    download(`cy_schedule_template.csv`, templateCSV(), 'text/csv');
    toast(t('exported') + ' · template', 'ok');
  } else if (fmt === 'tsv') {
    download(`cy_schedule_${stamp}.tsv`, toCSV('\t'), 'text/tab-separated-values');
    toast(t('exported'), 'ok');
  } else if (fmt === 'json') {
    const payload = {
      levels: State.levels, rows: State.rows, instructors: State.instructors,
      exportedAt: new Date().toISOString(),
    };
    download(`cy_schedule_${stamp}.json`, JSON.stringify(payload, null, 2), 'application/json');
    toast(t('exported'), 'ok');
  } else if (fmt === 'copy') {
    const payload = { levels: State.levels, rows: State.rows, instructors: State.instructors };
    navigator.clipboard.writeText(JSON.stringify(payload, null, 2))
      .then(() => toast(t('copied'), 'ok'))
      .catch(() => toast('Copy failed', 'bad'));
  }
}

function parseCSV(text, sep) {
  const rows = [];
  let cur = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i+1] === '"') { field += '"'; i++; }
        else inQ = false;
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === sep) { cur.push(field); field = ''; }
      else if (c === '\n') { cur.push(field); rows.push(cur); cur = []; field = ''; }
      else if (c === '\r') {}
      else field += c;
    }
  }
  if (field || cur.length) { cur.push(field); rows.push(cur); }
  return rows.filter(r => r.length > 1 || (r[0] && r[0].length));
}

// Import instructors from a simple CSV/TSV: columns are name and (optional)
// min_load. Headers are case-insensitive; both 'min_load' and 'minLoad' work.
function importInstructors(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = String(e.target.result || '').replace(/^﻿/, '');
    const sep = file.name.toLowerCase().endsWith('.tsv') ? '\t' : ',';
    try {
      const rows = parseCSV(text, sep);
      if (!rows.length) throw new Error('Empty file');
      const headers = rows[0].map(h => h.trim().toLowerCase());
      const nameIdx = headers.findIndex(h => h === 'name' || h === 'instructor' || h === 'الاسم');
      const minIdx  = headers.findIndex(h => h === 'min_load' || h === 'minload' || h === 'min' || h === 'الحد الأدنى');
      let added = 0, skipped = 0;
      mutate(() => {
        rows.slice(1).forEach(cols => {
          const name = (cols[nameIdx >= 0 ? nameIdx : 0] || '').trim();
          if (!name) return;
          if (State.instructors.some(i => i.name === name)) { skipped++; return; }
          const minLoad = parseInt(cols[minIdx], 10) || 12;
          State.instructors.push({ name, minLoad });
          added++;
        });
      });
      renderInstructors();
      renderSchedule();
      toast(`${t('imported')}: ${added}${skipped ? ` (${skipped} duplicates)` : ''}`, 'ok');
    } catch (err) {
      toast('Import failed: ' + err.message, 'bad');
    }
  };
  reader.readAsText(file);
}

function importFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = String(e.target.result || '').replace(/^﻿/, '');
    try {
      let levels, rows, instructors;
      if (file.name.endsWith('.json')) {
        const data = JSON.parse(text);
        if (data.levels && data.rows) {
          // v3 native
          levels = data.levels;
          rows = data.rows;
          instructors = data.instructors || [];
        } else if (Array.isArray(data) || data.rows) {
          // legacy v2 b1/b2 — migrate
          const m = migrateV2(Array.isArray(data) ? { rows: data } : data);
          levels = m.levels; rows = m.rows; instructors = m.instructors;
        } else {
          throw new Error('Unrecognized JSON shape');
        }
      } else {
        const sep = file.name.endsWith('.tsv') ? '\t' : ',';
        const parsed = parseCSV(text, sep);
        if (!parsed.length) throw new Error('Empty file');
        const headers = parsed[0].map(h => h.trim().toLowerCase());
        const items = parsed.slice(1).map(cols => {
          const obj = {};
          headers.forEach((h, i) => { obj[h] = (cols[i] || '').trim(); });
          return obj;
        });
        ({ levels, rows, instructors } = csvToState(items));
      }
      mutate(() => {
        State.levels = levels;
        State.rows = rows;
        State.instructors = instructors;
      });
      render();
      toast(`${t('imported')}: ${rows.length}`, 'ok');
    } catch (err) {
      console.error(err);
      toast('Import failed: ' + err.message, 'bad');
    }
  };
  reader.readAsText(file);
}

// Convert parsed CSV rows back to state. Detects wide vs long format
// by inspecting the headers of the first item.
function csvToState(items) {
  const levels = [];
  const levelByName = new Map();
  const ensureLevel = (name) => {
    const key = name || '—';
    if (levelByName.has(key)) return levelByName.get(key);
    const lv = newLevel(key);
    levelByName.set(key, lv);
    levels.push(lv);
    return lv;
  };

  // Detect wide format: any block1_time / block_1_time style header.
  const sample = items[0] || {};
  const isWide = Object.keys(sample).some(k => /^block\s*_?\s*\d+_(time|instr|room)$/.test(k));

  if (isWide) {
    const rows = items.map(it => {
      const lv = ensureLevel(it.level || '');
      const blocks = [];
      // Find block indices present
      const indices = new Set();
      Object.keys(it).forEach(k => {
        const m = k.match(/^block\s*_?\s*(\d+)_(time|instr|room)$/);
        if (m) indices.add(parseInt(m[1], 10));
      });
      Array.from(indices).sort((a, b) => a - b).forEach(i => {
        const time  = it[`block${i}_time`]  || '';
        const instr = it[`block${i}_instr`] || '';
        const room  = it[`block${i}_room`]  || '';
        if (time || instr || room) {
          blocks.push({ id: newId('bk'), time, instr, room });
        }
      });
      if (blocks.length === 0) blocks.push(newBlock());
      return {
        id: newId('sc'), levelId: lv.id,
        code: it.code || '', name: it.name || '',
        type: ['lecture','lab','online'].includes(it.type) ? it.type : 'lecture',
        credits: parseInt(it.credits, 10) || 0,
        days: it.days || '',
        blocks,
      };
    });
    return { levels, rows, instructors: [] };
  }

  // Long format: one row per block.
  const sectionsByKey = new Map();
  items.forEach(it => {
    const lv = ensureLevel(it.level || '');
    const key = lv.id + '|' + (it.code || '') + '|' + (it.type || '') + '|' + (it.name || '');
    let sec = sectionsByKey.get(key);
    if (!sec) {
      sec = {
        id: newId('sc'), levelId: lv.id,
        code: it.code || '', name: it.name || '',
        type: ['lecture','lab','online'].includes(it.type) ? it.type : 'lecture',
        credits: parseInt(it.credits, 10) || 0,
        days: it.days || '',
        blocks: [],
      };
      sectionsByKey.set(key, sec);
    }
    if (it.time || it.instr || it.room) {
      sec.blocks.push({
        id: newId('bk'),
        time: it.time || '', instr: it.instr || '', room: it.room || '',
      });
    }
  });
  const rows = Array.from(sectionsByKey.values());
  rows.forEach(s => { if (s.blocks.length === 0) s.blocks.push(newBlock()); });
  return { levels, rows, instructors: [] };
}

// ====================================================================
// TABS / LANG
// ====================================================================

function setTab(name) {
  document.querySelectorAll('.tab').forEach(t => {
    const isActive = t.getAttribute('data-tab') === name;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.toggle('active', p.id === 'panel-' + name);
  });
  if (name === 'grid')        renderGrid();
  if (name === 'conflicts')   renderConflicts();
  if (name === 'instructors') renderInstructors();
  if (name === 'courses')     renderCourses();
  if (name === 'versions')    renderVersions();
  if (name === 'settings')    renderSettings();
}

function setLang(l) {
  State.lang = l;
  document.body.dir = l === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = l;
  Storage.saveState();
  render();
}

// ====================================================================
// INIT
// ====================================================================

function init() {
  const saved = Storage.loadState();
  if (saved) {
    State.levels = saved.levels || [];
    State.rows = (saved.rows || []).map(r => {
      if (!r.id) r.id = newId('sc');
      r.blocks = (r.blocks || []).map(b => {
        if (!b.id) b.id = newId('bk');
        return b;
      });
      if (r.blocks.length === 0) r.blocks.push(newBlock());
      return r;
    });
    State.instructors = saved.instructors || [];
    State.lang = saved.lang || 'en';
    State.dismissedConflicts = Array.isArray(saved.dismissedConflicts) ? saved.dismissedConflicts : [];
    if (saved.config) {
      if (Array.isArray(saved.config.dayPatterns) && saved.config.dayPatterns.length)
        State.config.dayPatterns = saved.config.dayPatterns;
      if (Array.isArray(saved.config.lectureSlots) && saved.config.lectureSlots.length)
        State.config.lectureSlots = saved.config.lectureSlots;
      if (Array.isArray(saved.config.labSlots) && saved.config.labSlots.length)
        State.config.labSlots = saved.config.labSlots;
      if (Array.isArray(saved.config.onlineSlots) && saved.config.onlineSlots.length)
        State.config.onlineSlots = saved.config.onlineSlots;
    }
  }
  State.snapshots = Storage.loadSnapshots();
  document.body.dir = State.lang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = State.lang;

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => setTab(tab.getAttribute('data-tab')));
  });

  document.getElementById('btnLang').addEventListener('click',
    () => setLang(State.lang === 'en' ? 'ar' : 'en'));
  const printMenu = document.getElementById('printMenu');
  document.getElementById('btnPrint').addEventListener('click', (e) => {
    if (isDirty()) { toast(t('blocked_print'), 'warn'); return; }
    e.stopPropagation();
    printMenu.classList.toggle('open');
  });
  document.addEventListener('click', () => printMenu.classList.remove('open'));
  printMenu.querySelectorAll('[data-print]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      if (isDirty()) { toast(t('blocked_print'), 'warn'); printMenu.classList.remove('open'); return; }
      const mode = b.getAttribute('data-print');
      printMenu.classList.remove('open');
      if (mode === 'grid') setTab('grid');
      // Defer to next tick so the panel switch settles before print dialog
      setTimeout(() => window.print(), 50);
    });
  });
  document.getElementById('dirtyGoSnap').addEventListener('click', () => setTab('versions'));
  document.getElementById('btnUndo').addEventListener('click', () => {
    if (History.undo()) { render(); debouncedSave(); }
  });
  document.getElementById('btnRedo').addEventListener('click', () => {
    if (History.redo()) { render(); debouncedSave(); }
  });

  document.addEventListener('keydown', (e) => {
    const meta = e.metaKey || e.ctrlKey;
    const tag = e.target.tagName;
    const inField = tag === 'INPUT' || tag === 'TEXTAREA';
    if (meta && e.key === 'z' && !e.shiftKey) {
      if (inField) return;
      e.preventDefault();
      if (History.undo()) { render(); debouncedSave(); }
    } else if (meta && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) {
      if (inField) return;
      e.preventDefault();
      if (History.redo()) { render(); debouncedSave(); }
    }
  });

  const menu = document.getElementById('exportMenu');
  document.getElementById('btnExport').addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', () => menu.classList.remove('open'));
  menu.querySelectorAll('[data-export]').forEach(b => {
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      exportAs(b.getAttribute('data-export'));
      menu.classList.remove('open');
    });
  });

  document.getElementById('btnImport').addEventListener('click',
    () => document.getElementById('fileImport').click());
  document.getElementById('fileImport').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importFile(f);
    e.target.value = '';
  });
  document.getElementById('fileImportInstr').addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) importInstructors(f);
    e.target.value = '';
  });

  render();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
