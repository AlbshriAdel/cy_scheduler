<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>CY Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Cool, low-saturation neutrals — easier on the eyes than the
       previous warm-paper stack. Cards are pure white, the body is a
       soft cool grey, and accents are slightly muted. */
    --paper: #F4F6F8;
    --paper-warm: #EAEEF2;
    --paper-warmer: #DEE3E9;
    --card: #FFFFFF;
    --card-tint: #F7F9FB;
    --ink: #1A2030;
    --ink-soft: #4A5260;
    --ink-faint: #828B98;
    --rule: #DDE2E8;
    --rule-soft: #EBEEF2;

    --accent: #2A3550;
    --accent-soft: #44506C;
    --terra: #9D5A36;

    --status-ok: #2E6E3F;
    --status-ok-bg: #E0EFE2;
    --status-warn: #8A6A1F;
    --status-warn-bg: #F4E9CC;
    --status-bad: #A23D24;
    --status-bad-bg: #F4DDD3;
    --status-info: #2A4A6B;
    --status-info-bg: #DEE6EE;
    --status-mute: #6B7280;
    --status-mute-bg: #E6E9EE;

    --shadow-sm: 0 1px 2px rgba(26,22,20,.06);
    --shadow-md: 0 2px 8px rgba(26,22,20,.08);
    --shadow-lg: 0 4px 18px rgba(26,22,20,.10);

    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(1200px 600px at 90% -10%, rgba(42,53,80,.025), transparent 60%),
      radial-gradient(900px 500px at -10% 100%, rgba(42,53,80,.02), transparent 60%);
    min-height: 100vh;
  }
  body[dir="rtl"] { font-family: 'Tajawal', 'Geist', sans-serif; }
  .mono { font-family: 'Geist Mono', monospace; font-feature-settings: "tnum" 1; }
  .serif { font-family: 'Fraunces', serif; }

  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font: inherit; color: inherit; }
  a { color: var(--accent); }

  button:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 14px 24px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    margin: 20px 24px 0;
    box-shadow: var(--shadow-md);
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-logo {
    width: 40px; height: 40px;
    background: var(--accent); color: var(--paper);
    display: grid; place-items: center;
    border-radius: 10px;
    font-family: 'Geist Mono', monospace;
    font-weight: 600; font-size: 13px; letter-spacing: .05em;
  }
  .brand-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-sub {
    font-size: 11px; color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .12em; text-transform: uppercase; margin-top: 2px;
  }
  .toolbar-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    color: var(--ink-soft);
    transition: background .15s, border-color .15s, transform .05s;
  }
  .btn:hover { background: var(--card-tint); border-color: var(--ink-faint); }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: var(--paper); border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--paper-warm); }
  .btn-icon { padding: 8px; }
  .btn-sm { padding: 6px 10px; font-size: 12px; }
  .btn-danger { color: var(--status-bad); }
  .btn-danger:hover { background: var(--status-bad-bg); border-color: var(--status-bad); }
  .btn[disabled] { opacity: .4; cursor: not-allowed; }

  .menu-wrap { position: relative; }
  .menu {
    position: absolute; top: calc(100% + 6px); right: 0;
    min-width: 180px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    padding: 6px; z-index: 20; display: none;
  }
  body[dir="rtl"] .menu { right: auto; left: 0; }
  .menu.open { display: block; }
  .menu-item {
    display: block; width: 100%; text-align: left;
    padding: 8px 12px; border-radius: 6px;
    font-size: 13px; color: var(--ink-soft);
  }
  body[dir="rtl"] .menu-item { text-align: right; }
  .menu-item:hover { background: var(--card-tint); color: var(--ink); }

  /* TABS */
  .tabs {
    display: flex; gap: 4px;
    margin: 16px 24px 0; padding: 6px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    overflow-x: auto;
  }
  .tab {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    color: var(--ink-faint);
    white-space: nowrap;
    transition: background .15s, color .15s;
  }
  .tab:hover { background: var(--card-tint); color: var(--ink-soft); }
  .tab.active { background: var(--accent); color: var(--paper); }
  .tab-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); }
  .tab.active .tab-dot { background: var(--paper-warm); }
  .tab-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 6px;
    border-radius: 9px;
    background: var(--status-bad-bg);
    color: var(--status-bad);
    font-family: 'Geist Mono', monospace;
    font-size: 11px; font-weight: 600;
  }
  .tab.active .tab-badge { background: var(--paper); color: var(--accent); }
  .tab-badge[data-count="0"] { display: none; }

  /* PANEL */
  .panel-wrap { padding: 16px 24px 60px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 16px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .panel-title { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
  .panel-sub { font-size: 13px; color: var(--ink-faint); margin-top: 4px; }
  .panel-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* EMPTY STATE */
  .empty {
    background: var(--card);
    border: 1px dashed var(--rule);
    border-radius: var(--radius);
    padding: 60px 24px; text-align: center;
    color: var(--ink-faint);
  }
  .empty-title { font-family: 'Fraunces', serif; font-size: 18px; color: var(--ink-soft); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; margin-bottom: 18px; }

  /* LEVEL — clean white container with a navy top accent.
     The container is the calmest surface; warmth lives on the section
     cards inside, so the eye reads outer→inner = cool→warm→cool. */
  .level-section {
    background: var(--card);
    border: 1px solid var(--rule);
    border-top: 4px solid var(--accent);
    border-radius: var(--radius);
    padding: 18px 20px 20px;
    margin-bottom: 20px;
    box-shadow: var(--shadow-md);
  }
  body[dir="rtl"] .level-section { /* override v3 left stripe */
    border-left: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
    border-top: 4px solid var(--accent);
  }
  .level-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule-soft);
    flex-wrap: wrap;
  }
  .level-title-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .level-name { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; color: var(--ink); }
  .level-name-input {
    font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600;
    background: transparent; border: 1px solid transparent;
    padding: 4px 8px; border-radius: 6px; min-width: 200px;
  }
  .level-name-input:hover { border-color: var(--rule); }
  .level-name-input:focus { border-color: var(--accent); outline: none; }
  .level-meta {
    font-size: 12px; color: var(--ink-faint);
    font-family: 'Geist Mono', monospace; letter-spacing: .04em;
  }
  .level-actions { display: flex; gap: 6px; }

  /* SECTION CARD — bright white to stand against warm level fill */
  .section-card {
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 12px;
    background: var(--card);
    transition: border-color .15s;
    box-shadow: var(--shadow-sm);
  }
  .section-card:last-child { margin-bottom: 0; }
  .section-card.has-conflict { border-color: var(--status-bad); background: #FBF2EE; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .section-title { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .section-code { font-family: 'Geist Mono', monospace; font-weight: 600; color: var(--accent); font-size: 14px; }
  .section-name { font-size: 14px; color: var(--ink); font-weight: 500; }
  .section-actions { display: flex; gap: 6px; }

  .row-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 11px; color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .field-input, .field-select {
    padding: 7px 10px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 6px;
    font-size: 13px; color: var(--ink);
    width: 100%;
  }
  .field-input:hover, .field-select:hover { border-color: var(--ink-faint); }

  /* BLOCKS */
  .blocks-wrap { margin-top: 12px; }
  .blocks-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 8px;
  }
  .blocks-label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  .blocks-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 10px;
  }
  /* BLOCK — calm cool tint with a slim accent stripe so the L→S→B
     hierarchy is still legible without warm color overload. */
  .block {
    border: 1px solid var(--rule-soft);
    border-left: 3px solid var(--accent-soft);
    border-radius: 6px;
    padding: 10px;
    background: var(--card-tint);
  }
  body[dir="rtl"] .block {
    border-left: 1px solid var(--rule-soft);
    border-right: 3px solid var(--accent-soft);
  }
  .block-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 8px;
  }
  .block-head.clickable {
    cursor: pointer;
    border-radius: 4px;
    margin: -2px -4px 6px;
    padding: 2px 4px;
    user-select: none;
    transition: background .12s;
  }
  .block-head.clickable:hover { background: rgba(42,53,80,.05); }
  .block-head .block-caret {
    display: inline-block;
    width: 12px;
    color: var(--terra);
    font-size: 10px;
    margin-right: 2px;
  }
  body[dir="rtl"] .block-head .block-caret { margin-right: 0; margin-left: 2px; }
  .block-summary {
    color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    text-transform: none;
    letter-spacing: 0;
    font-weight: 400;
  }
  .block.collapsed { padding: 6px 10px; }
  .block.collapsed .block-head { margin-bottom: 0; }
  .block-name {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-faint);
  }
  .block-actions { display: flex; gap: 4px; }

  /* STATUS PILL */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    font-family: 'Geist Mono', monospace;
    letter-spacing: .04em; text-transform: uppercase;
  }
  .pill-ok   { color: var(--status-ok);   background: var(--status-ok-bg); }
  .pill-warn { color: var(--status-warn); background: var(--status-warn-bg); }
  .pill-bad  { color: var(--status-bad);  background: var(--status-bad-bg); }
  .pill-info { color: var(--status-info); background: var(--status-info-bg); }
  .pill-mute { color: var(--status-mute); background: var(--status-mute-bg); }

  /* CONFLICTS */
  .rules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .rule-card {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius-sm);
    padding: 14px;
  }
  .rule-id { font-family: 'Geist Mono', monospace; font-weight: 600; font-size: 11px; color: var(--terra); letter-spacing: .08em; }
  .rule-title { font-weight: 600; font-size: 14px; margin: 4px 0 6px; color: var(--ink); }

  .issues-list {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .issue {
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule-soft);
    display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap;
  }
  .issue:last-child { border-bottom: none; }
  .issue-meta { font-size: 12px; color: var(--ink-faint); font-family: 'Geist Mono', monospace; }
  .issue-text { font-size: 13px; color: var(--ink); flex: 1; min-width: 200px; }

  /* VERSIONS */
  .snapshot-form { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); padding: 18px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  .snapshot-list { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; }
  .snapshot {
    padding: 14px 18px; border-bottom: 1px solid var(--rule-soft);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .snapshot:last-child { border-bottom: none; }
  .snapshot.latest { background: var(--card-tint); }
  .snapshot-version { font-family: 'Geist Mono', monospace; font-weight: 600; color: var(--accent); font-size: 13px; }
  .snapshot-info { flex: 1; min-width: 180px; }
  .snapshot-meta { font-size: 12px; color: var(--ink-faint); }
  .snapshot-notes { font-size: 13px; color: var(--ink-soft); margin-top: 2px; }

  /* TABLES */
  .table-wrap { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius); overflow: hidden; }
  table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data th {
    padding: 12px 14px; text-align: left;
    background: var(--paper-warm); color: var(--ink-soft);
    font-weight: 600; font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    border-bottom: 1px solid var(--rule);
  }
  body[dir="rtl"] table.data th { text-align: right; }
  table.data td { padding: 12px 14px; border-bottom: 1px solid var(--rule-soft); vertical-align: middle; }
  table.data tr:last-child td { border-bottom: none; }
  table.data tr:hover td { background: var(--card-tint); }

  .load-bar { height: 8px; background: var(--paper-warmer); border-radius: 4px; overflow: hidden; min-width: 80px; }
  .load-bar-fill { height: 100%; border-radius: 4px; transition: width .25s; }
  .load-fill-ok    { background: var(--status-ok); }
  .load-fill-under { background: var(--status-warn); }
  .load-fill-over  { background: var(--status-bad); }

  .add-form {
    background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius);
    padding: 16px; margin-bottom: 16px;
    display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
  }
  .add-form .field { flex: 1; min-width: 140px; }

  /* TOAST */
  .toast-stack {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 100; pointer-events: none;
  }
  body[dir="rtl"] .toast-stack { right: auto; left: 20px; }
  .toast {
    background: var(--accent); color: var(--paper);
    padding: 10px 16px; border-radius: var(--radius-sm);
    box-shadow: var(--shadow-lg);
    font-size: 13px; pointer-events: auto;
    animation: toast-in .2s ease-out;
    max-width: 360px;
  }
  .toast.ok { background: var(--status-ok); }
  .toast.bad { background: var(--status-bad); }
  .toast.warn { background: var(--status-warn); }
  @keyframes toast-in {
    from { transform: translateY(8px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* MODAL */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,22,20,.4);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    max-width: 480px; width: 100%; overflow: hidden;
  }
  .modal-head { padding: 16px 20px; border-bottom: 1px solid var(--rule-soft); font-family: 'Fraunces', serif; font-size: 16px; font-weight: 600; }
  .modal-body { padding: 16px 20px; }
  .modal-foot { padding: 12px 20px; border-top: 1px solid var(--rule-soft); display: flex; justify-content: flex-end; gap: 8px; background: var(--card-tint); }
  .modal-field { margin-bottom: 12px; }
  .modal-field label {
    display: block; font-size: 11px; color: var(--ink-faint);
    font-family: 'Geist Mono', monospace; letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .modal-field input, .modal-field textarea, .modal-field select {
    width: 100%; padding: 8px 10px;
    background: var(--card); border: 1px solid var(--rule);
    border-radius: 6px; font-size: 13px; color: var(--ink);
  }
  .modal-field textarea { min-height: 80px; resize: vertical; font-family: inherit; }

  /* PRINT */
  @media print {
    @page { size: A4 landscape; margin: 12mm; }
    body { background: white; color: black; }
    .toolbar, .tabs, .panel-actions, .section-actions, .level-actions, .block-actions,
    .toast-stack, .modal-backdrop, .add-form, .menu, .snapshot-form,
    .grid-filters, .grid-legend, .dirty-banner, .view-week-btn { display: none !important; }
    /* Only the active panel prints. */
    .panel { display: none !important; page-break-after: always; }
    .panel.active { display: block !important; }
    .panel-wrap { padding: 0; }
    .panel-header { margin-bottom: 8px; }
    .panel-title { font-size: 18px; }
    .panel-sub { display: none; }
    .level-section, .rule-card, .issues-list, .table-wrap, .grid-table {
      box-shadow: none; border-color: #999; page-break-inside: avoid;
    }
    .level-section { padding: 10px; margin-bottom: 8px; }
    .level-head { margin-bottom: 8px; padding-bottom: 6px; }
    .section-card { background: white; padding: 8px; margin-bottom: 6px; }
    .row-grid { gap: 4px; }
    .field-label { font-size: 9px; }
    .field-select, .field-input, .level-name-input {
      border: none; background: transparent; padding: 0; font-size: 11px;
      -webkit-appearance: none; appearance: none;
    }
    .pill { border: 1px solid currentColor; }
    .blocks-list { grid-template-columns: 1fr 1fr; gap: 6px; }
    .block { padding: 6px; }

    /* Grid panel print: compact, fits A4 landscape on one page.
       Usable area ≈ 273 × 190 mm; with header + legend ≈ 175 mm for the
       grid → 12 slot rows × ~13 mm each. */
    #panel-grid.active .grid-table { font-size: 9px; }
    .grid-row {
      grid-template-columns: 60px repeat(5, 1fr);
      page-break-inside: avoid;
    }
    .grid-cell { min-height: 0; padding: 2px 4px; font-size: 9px; line-height: 1.2; }
    .grid-cell.head { font-size: 8px; padding: 2px; }
    .grid-cell.time { font-size: 8px; padding: 2px; }
    .grid-session-code { font-size: 9px; margin-bottom: 1px; }
    .grid-session-sub { font-size: 8px; }
    .grid-session + .grid-session { margin-top: 2px; padding-top: 2px; }
    .grid-cell.busy { background: #EEF2F8 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .grid-cell.conflict { background: #F4D6CD !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    /* Don't paginate the grid in the middle of the table */
    .grid-table { page-break-inside: avoid; break-inside: avoid; }
  }

  .stack { display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 8px; }
  .grow { flex: 1; }
  .hidden { display: none !important; }

  /* DIRTY BANNER */
  .dirty-banner {
    display: flex; align-items: center; gap: 10px;
    margin: 12px 24px 0;
    padding: 10px 16px;
    background: var(--status-warn-bg);
    color: var(--status-warn);
    border: 1px solid var(--status-warn);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .dirty-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--status-warn);
    flex: 0 0 8px;
  }
  .dirty-text { flex: 1; }
  .dirty-banner .btn {
    background: var(--card); border-color: var(--status-warn);
    color: var(--status-warn);
  }
  .btn[disabled] { opacity: .45; cursor: not-allowed; }

  /* GRID */
  .grid-filters {
    display: flex; gap: 10px; flex-wrap: wrap;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .grid-filter { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
  .grid-filter label {
    font-size: 11px; color: var(--ink-faint);
    font-family: 'Geist Mono', monospace;
    letter-spacing: .08em; text-transform: uppercase;
  }
  .grid-filter select {
    padding: 7px 10px;
    background: var(--card-tint);
    border: 1px solid var(--rule);
    border-radius: 6px;
    font-size: 13px;
  }
  .grid-table {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: var(--radius);
    overflow: hidden;
    overflow-x: auto;
  }
  .grid-row {
    display: grid;
    grid-template-columns: 110px repeat(5, minmax(140px, 1fr));
    border-bottom: 1px solid var(--rule-soft);
  }
  .grid-row:last-child { border-bottom: none; }
  .grid-cell {
    padding: 8px 10px;
    border-right: 1px solid var(--rule-soft);
    min-height: 60px;
    font-size: 12px;
    position: relative;
  }
  .grid-cell:last-child { border-right: none; }
  .grid-cell.head {
    background: var(--paper-warm);
    color: var(--ink-soft);
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    text-align: center;
  }
  .grid-cell.time {
    background: var(--card-tint);
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    text-align: center;
  }
  .grid-cell.time-lab { color: var(--terra); }
  .grid-cell.busy {
    background: var(--status-info-bg);
    color: var(--status-info);
  }
  .grid-cell.conflict {
    background: var(--status-bad-bg);
    color: var(--status-bad);
  }
  .grid-cell.free {
    color: var(--ink-faint);
    font-style: italic;
  }
  .grid-session-code {
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 2px;
  }
  .grid-session-sub {
    font-size: 11px;
    opacity: .85;
    line-height: 1.3;
  }
  .grid-session + .grid-session {
    margin-top: 4px;
    padding-top: 4px;
    border-top: 1px dashed currentColor;
  }
  .grid-legend {
    display: flex; gap: 14px; margin-top: 10px;
    font-size: 11px; color: var(--ink-faint);
    flex-wrap: wrap;
  }
  .legend-swatch {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }

  /* INSTRUCTOR WEEK BUTTON inside block */
  .block .field {
    position: relative;
  }
  .view-week-btn {
    position: absolute; top: 0; right: 0;
    font-size: 11px; padding: 2px 6px;
    color: var(--accent);
    background: transparent;
    border-radius: 4px;
  }
  body[dir="rtl"] .view-week-btn { right: auto; left: 0; }
  .view-week-btn:hover { background: var(--paper-warm); }
</style>

<header class="toolbar" role="banner">
  <div class="brand">
    <div class="brand-logo" aria-hidden="true">CY</div>
    <div>
      <div class="brand-title" data-i18n="brand_title">CY Schedule</div>
      <div class="brand-sub" data-i18n="brand_sub">Cybersecurity Department · Scheduler</div>
    </div>
  </div>
  <div class="toolbar-actions">
    <button class="btn btn-ghost btn-icon" id="btnUndo" title="Undo" aria-label="Undo">↶</button>
    <button class="btn btn-ghost btn-icon" id="btnRedo" title="Redo" aria-label="Redo">↷</button>
    <span style="width:1px; height:20px; background:var(--rule);"></span>
    <button class="btn" id="btnImport" data-i18n="import">Import</button>
    <input type="file" id="fileImport" accept=".csv,.tsv,.json" hidden />
    <input type="file" id="fileImportInstr" accept=".csv,.tsv" hidden />
    <div class="menu-wrap">
      <button class="btn" id="btnExport" data-i18n="export">Export ▾</button>
      <div class="menu" id="exportMenu" role="menu">
        <button class="menu-item" data-export="xlsx">Excel (.xlsx) · full timetable</button>
        <button class="menu-item" data-export="csv">CSV (.csv) · long</button>
        <button class="menu-item" data-export="csv-wide">CSV (.csv) · wide</button>
        <button class="menu-item" data-export="tsv">TSV (.tsv)</button>
        <button class="menu-item" data-export="json">JSON (.json)</button>
        <button class="menu-item" data-export="copy">Copy as JSON</button>
        <button class="menu-item" data-export="template">Download template</button>
      </div>
    </div>
    <div class="menu-wrap">
      <button class="btn" id="btnPrint" data-i18n="print">Print ▾</button>
      <div class="menu" id="printMenu" role="menu">
        <button class="menu-item" data-print="active" data-i18n="print">Print</button>
        <button class="menu-item" data-print="grid" data-i18n="print_grid">Print grid</button>
      </div>
    </div>
    <button class="btn" id="btnLang" title="Toggle language">EN / ع</button>
  </div>
</header>

<nav class="tabs" role="tablist" aria-label="Sections">
  <button class="tab active" role="tab" data-tab="schedule" aria-selected="true">
    <span class="tab-dot"></span><span data-i18n="tab_schedule">Schedule</span>
  </button>
  <button class="tab" role="tab" data-tab="grid" aria-selected="false">
    <span class="tab-dot"></span><span data-i18n="tab_grid">Grid</span>
  </button>
  <button class="tab" role="tab" data-tab="conflicts" aria-selected="false">
    <span class="tab-dot"></span><span data-i18n="tab_conflicts">Conflicts</span>
    <span class="tab-badge" id="conflictBadge" data-count="0">0</span>
  </button>
  <button class="tab" role="tab" data-tab="versions" aria-selected="false">
    <span class="tab-dot"></span><span data-i18n="tab_versions">Versions</span>
  </button>
  <button class="tab" role="tab" data-tab="instructors" aria-selected="false">
    <span class="tab-dot"></span><span data-i18n="tab_instructors">Instructors</span>
  </button>
  <button class="tab" role="tab" data-tab="courses" aria-selected="false">
    <span class="tab-dot"></span><span data-i18n="tab_courses">Courses</span>
  </button>
  <button class="tab" role="tab" data-tab="settings" aria-selected="false">
    <span class="tab-dot"></span><span data-i18n="tab_settings">Settings</span>
  </button>
</nav>

<div id="dirtyBanner" class="dirty-banner hidden" role="status">
  <span class="dirty-dot"></span>
  <span class="dirty-text" data-i18n="dirty_banner">Unsaved changes — create a snapshot to enable Export &amp; Print.</span>
  <button class="btn btn-sm" id="dirtyGoSnap" data-i18n="dirty_take">Create snapshot</button>
</div>

<main class="panel-wrap">
  <section class="panel active" id="panel-schedule" role="tabpanel"></section>
  <section class="panel" id="panel-grid" role="tabpanel"></section>
  <section class="panel" id="panel-conflicts" role="tabpanel"></section>
  <section class="panel" id="panel-versions" role="tabpanel"></section>
  <section class="panel" id="panel-instructors" role="tabpanel"></section>
  <section class="panel" id="panel-courses" role="tabpanel"></section>
  <section class="panel" id="panel-settings" role="tabpanel"></section>
</main>

<div class="toast-stack" id="toastStack" aria-live="polite"></div>

<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-head" id="modalHead"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

const newId = (p='id') => p + '_' + Math.random().toString(36).slice(2, 9);

const newLevel = (name = '') => ({ id: newId('lv'), name });

const newBlock = () => ({ id: newId('bk'), time: '', instr: '', room: '' });

const newSection = (levelId) => ({
  id: newId('sc'),
  levelId,
  code: '', name: '', type: 'lecture', credits: 3,
  days: '',
  blocks: [newBlock()],
});

const Storage = {
  loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_STATE);
      if (raw) return JSON.parse(raw);
      // Migrate from v2 and persist immediately so the new key takes over.
      const legacy = localStorage.getItem(LEGACY_STATE);
      if (legacy) {
        const migrated = migrateV2(JSON.parse(legacy));
        try { localStorage.setItem(STORAGE_STATE, JSON.stringify(migrated)); }
        catch (e) {}
        return migrated;
      }
      return null;
    } catch (e) { return null; }
  },
  saveState() {
    try {
      const data = {
        levels: State.levels,
        rows: State.rows,
        instructors: State.instructors,
        lang: State.lang,
        config: State.config,
        dismissedConflicts: State.dismissedConflicts,
      };
      localStorage.setItem(STORAGE_STATE, JSON.stringify(data));
    } catch (e) { console.warn('save failed', e); }
  },
  loadSnapshots() {
    try {
      const raw = localStorage.getItem(STORAGE_SNAPS);
      if (raw) return JSON.parse(raw);
      const legacy = localStorage.getItem(LEGACY_SNAPS);
      if (legacy) return JSON.parse(legacy);
      return [];
    } catch (e) { return []; }
  },
  saveSnapshots() {
    try { localStorage.setItem(STORAGE_SNAPS, JSON.stringify(State.snapshots)); }
    catch (e) { console.warn('snap save failed', e); }
  },
};

// Convert v2 (b1/b2 with level string) → v3 (levels[] + blocks[])
function migrateV2(v2) {
  const levels = [];
  const levelByName = new Map();
  const ensureLevel = (name) => {
    const key = name || '—';
    if (levelByName.has(key)) return levelByName.get(key);
    const lv = newLevel(key);
    levelByName.set(key, lv);
    levels.push(lv);
    return lv;
  };
  const rows = (v2.rows || []).map(r => {
    const lv = ensureLevel(r.level || '');
    const blocks = [];
    if (r.b1 && (r.b1.time || r.b1.instr || r.b1.room)) {
      blocks.push({ id: newId('bk'), time: r.b1.time || '', instr: r.b1.instr || '', room: r.b1.room || '' });
    }
    if (r.b2 && (r.b2.time || r.b2.instr || r.b2.room)) {
      blocks.push({ id: newId('bk'), time: r.b2.time || '', instr: r.b2.instr || '', room: r.b2.room || '' });
    }
    if (blocks.length === 0) blocks.push(newBlock());
    const days = (r.b1 && r.b1.days) || (r.b2 && r.b2.days) || '';
    return {
      id: r.id || newId('sc'),
      levelId: lv.id,
      code: r.code || '', name: r.name || '',
      type: r.type || 'lecture',
      credits: r.credits || 0,
      days,
      blocks,
    };
  });
  return {
    levels, rows,
    instructors: v2.instructors || [],
    lang: v2.lang || 'en',
  };
}

let saveTimer = null;
const debouncedSave = () => {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => Storage.saveState(), 250);
};

// ====================================================================
// HISTORY
// ====================================================================

const History = {
  snapshot() {
    const s = JSON.stringify({
      levels: State.levels, rows: State.rows, instructors: State.instructors,
    });
    State.history.push(s);
    if (State.history.length > HISTORY_CAP) State.history.shift();
    State.future.length = 0;
    updateHistoryButtons();
  },
  apply(json) {
    const data = JSON.parse(json);
    State.levels = data.levels;
    State.rows = data.rows;
    State.instructors = data.instructors;
  },
  undo() {
    if (State.history.length === 0) return false;
    State.future.push(JSON.stringify({
      levels: State.levels, rows: State.rows, instructors: State.instructors,
    }));
    History.apply(State.history.pop());
    updateHistoryButtons();
    return true;
  },
  redo() {
    if (State.future.length === 0) return false;
    State.history.push(JSON.stringify({
      levels: State.levels, rows: State.rows, instructors: State.instructors,
    }));
    History.apply(State.future.pop());
    updateHistoryButtons();
    return true;
  },
};

function updateHistoryButtons() {
  document.getElementById('btnUndo').disabled = State.history.length === 0;
  document.getElementById('btnRedo').disabled = State.future.length === 0;
}

// Dirty = state has changed since the latest snapshot. When dirty, Export
// and Print are blocked until the user creates a snapshot ("a copy of the
// current version").
function isDirty() {
  if (State.levels.length === 0 && State.rows.length === 0) return false;
  if (State.snapshots.length === 0) return true;
  const latest = State.snapshots[State.snapshots.length - 1];
  const cur = JSON.stringify({ levels: State.levels, rows: State.rows });
  const ref = JSON.stringify({ levels: latest.levels || [], rows: latest.rows || [] });
  return cur !== ref;
}

function updateGate() {
  const dirty = isDirty();
  const banner = document.getElementById('dirtyBanner');
  if (banner) banner.classList.toggle('hidden', !dirty);
  const btnExp = document.getElementById('btnExport');
  const btnPr = document.getElementById('btnPrint');
  if (btnExp) {
    btnExp.disabled = dirty;
    btnExp.title = dirty ? t('blocked_export') : '';
  }
  if (btnPr) {
    btnPr.disabled = dirty;
    btnPr.title = dirty ? t('blocked_print') : '';
  }
}

function mutate(fn) {
  History.snapshot();
  fn();
  debouncedSave();
  updateGate();
}

let coalesceTimer = null;
function mutateCoalesced(fn) {
  if (coalesceTimer === null) History.snapshot();
  fn();
  debouncedSave();
  updateGate();
  clearTimeout(coalesceTimer);
  coalesceTimer = setTimeout(() => { coalesceTimer = null; }, 600);
}

// ====================================================================
// RULES / CONFLICTS
// ====================================================================

const slotsFor = (type) => {
  if (type === 'lab') return State.config.labSlots;
  if (type === 'online') return State.config.onlineSlots;
  return State.config.lectureSlots;
};
const findSlot = (type, code) => slotsFor(type).find(s => s.code === code) || null;
const rangesOverlap = (a, b) => a.start < b.end && b.start < a.end;
const expandDays = (s) => s ? s.split(',').map(x => x.trim()).filter(Boolean) : [];

// Effective days for a block: block-level override first, falling back to
// the section's days field. Empty string means "inherit".
function effectiveDays(row, block) {
  return (block && block.days) ? block.days : row.days;
}

function buildSessions() {
  const out = [];
  State.rows.forEach(r => {
    r.blocks.forEach((b, idx) => {
      const dayStr = effectiveDays(r, b);
      if (!dayStr) return;
      if (!b.time) return;
      const slot = findSlot(r.type, b.time);
      if (!slot) return;
      expandDays(dayStr).forEach(day => {
        out.push({
          rowId: r.id, blockId: b.id, blockIdx: idx, day,
          start: slot.start, end: slot.end, slotCode: b.time,
          levelId: r.levelId, type: r.type,
          code: r.code, name: r.name, days: dayStr,
          instr: b.instr, room: b.room,
        });
      });
    });
  });
  return out;
}

// Cache of the most recent conflict computation. Render code reads from
// this so functions don't need to thread it through.
let _lastConflicts = {
  issues: [], dismissedIssues: [],
  byBlock: new Set(), reasonsByBlock: new Map(),
};

// Order-independent canonical signature for a conflict pair, used to look
// up dismissals across runs even if a/b swap order.
function conflictSig(iss) {
  const parts = [iss.a, iss.b].sort();
  return `${iss.rule}|${iss.day}|${parts[0]}|${parts[1]}`;
}

function detectConflicts() {
  const sessions = buildSessions();
  const allIssues = [];
  const sessionLabel = (s) => `${s.code || '?'} B${s.blockIdx + 1} (${s.slotCode})`;

  for (let i = 0; i < sessions.length; i++) {
    for (let j = i + 1; j < sessions.length; j++) {
      const a = sessions[i], b = sessions[j];
      if (a.day !== b.day) continue;
      if (!rangesOverlap(a, b)) continue;
      const aKey = a.rowId + '|' + a.blockId;
      const bKey = b.rowId + '|' + b.blockId;

      // R5: same course at overlapping time. "Same course" = same row OR
      // any rows that share the same non-empty code (e.g. CECS-211 lecture
      // row + CECS-211 online row). Catches the case where Block 1, Block 2,
      // and Online sections of the same course collide on day & time.
      const sameCourse = (a.rowId === b.rowId)
        || (a.code && b.code && a.code === b.code);
      if (sameCourse) {
        const aKindA = a.rowId === b.rowId ? `Block ${a.blockIdx + 1}` : `${a.type} B${a.blockIdx + 1}`;
        const aKindB = a.rowId === b.rowId ? `Block ${b.blockIdx + 1}` : `${b.type} B${b.blockIdx + 1}`;
        allIssues.push({
          rule: 'R5', day: a.day, a: aKey, b: bKey,
          reason: `Course "${a.code || a.name}" has ${aKindA} and ${aKindB} at the same time.`,
          tipA: `R5 ${a.day}: same course, also has ${aKindB} at this time`,
          tipB: `R5 ${a.day}: same course, also has ${aKindA} at this time`,
        });
      }
      // R6: instructor double-book — only flagged when both blocks are non-online.
      if (a.instr && a.instr === b.instr && a.type !== 'online' && b.type !== 'online') {
        allIssues.push({
          rule: 'R6', day: a.day, a: aKey, b: bKey,
          reason: `Instructor "${a.instr}" is double-booked.`,
          tipA: `R6 ${a.day}: ${a.instr} also teaches ${sessionLabel(b)}`,
          tipB: `R6 ${a.day}: ${a.instr} also teaches ${sessionLabel(a)}`,
        });
      }
      // R7: room double-book — non-online only.
      if (a.room && a.room === b.room && a.type !== 'online' && b.type !== 'online') {
        allIssues.push({
          rule: 'R7', day: a.day, a: aKey, b: bKey,
          reason: `Room "${a.room}" is double-booked.`,
          tipA: `R7 ${a.day}: room ${a.room} also used by ${sessionLabel(b)}`,
          tipB: `R7 ${a.day}: room ${a.room} also used by ${sessionLabel(a)}`,
        });
      }
    }
  }

  // Partition into active / dismissed. Dismissed conflicts don't propagate
  // to byBlock / reasonsByBlock so the Schedule and Grid won't show them
  // as red.
  const dismissed = new Set(State.dismissedConflicts);
  const issues = [];
  const dismissedIssues = [];
  const byBlock = new Set();
  const reasonsByBlock = new Map();
  const addReason = (key, reason) => {
    if (!reasonsByBlock.has(key)) reasonsByBlock.set(key, []);
    const list = reasonsByBlock.get(key);
    if (!list.includes(reason)) list.push(reason);
  };
  allIssues.forEach(iss => {
    iss.sig = conflictSig(iss);
    if (dismissed.has(iss.sig)) {
      dismissedIssues.push(iss);
    } else {
      issues.push(iss);
      byBlock.add(iss.a); byBlock.add(iss.b);
      addReason(iss.a, iss.tipA);
      addReason(iss.b, iss.tipB);
    }
  });

  _lastConflicts = { issues, dismissedIssues, byBlock, reasonsByBlock };
  return _lastConflicts;
}

function dismissConflict(sig) {
  if (!State.dismissedConflicts.includes(sig)) {
    mutate(() => { State.dismissedConflicts.push(sig); });
    renderConflicts();
    refreshAfterEdit();
  }
}

function restoreConflict(sig) {
  const i = State.dismissedConflicts.indexOf(sig);
  if (i >= 0) {
    mutate(() => { State.dismissedConflicts.splice(i, 1); });
    renderConflicts();
    refreshAfterEdit();
  }
}

function dismissAllConflicts() {
  // Always recompute — the cached _lastConflicts could be stale if a
  // re-render happened between the last detectConflicts call and the click.
  const fresh = detectConflicts();
  const all = fresh.issues.map(conflictSig);
  if (all.length === 0) return;
  mutate(() => {
    all.forEach(sig => {
      if (!State.dismissedConflicts.includes(sig)) State.dismissedConflicts.push(sig);
    });
  });
  renderConflicts();
  refreshAfterEdit();
}

function clearDismissals() {
  if (State.dismissedConflicts.length === 0) return;
  mutate(() => { State.dismissedConflicts = []; });
  renderConflicts();
  refreshAfterEdit();
}

function blockStatus(row, block, conflictBlocks) {
  const filled = block.time || block.instr || block.room || block.days;
  const effDays = effectiveDays(row, block);
  if (!filled && !effDays) return 'blank';
  if (conflictBlocks.has(row.id + '|' + block.id)) return 'conflict';
  if (!effDays) return 'missing-days';
  if (!block.time) return 'missing-time';
  if (!block.instr) return 'missing-instr';
  return 'scheduled';
}

const STATUS_LABELS = {
  'blank':         { key: 'status_blank',         cls: 'pill-mute' },
  'scheduled':     { key: 'status_scheduled',     cls: 'pill-ok' },
  'missing-days':  { key: 'status_missing_days',  cls: 'pill-warn' },
  'missing-time':  { key: 'status_missing_time',  cls: 'pill-warn' },
  'missing-instr': { key: 'status_missing_instr', cls: 'pill-warn' },
  'conflict':      { key: 'status_conflict',      cls: 'pill-bad' },
};

// ====================================================================
// UI HELPERS
// ====================================================================

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') {
      node.addEventListener(k.slice(2).toLowerCase(), v);
    } else if (k.startsWith('data-')) {
      node.setAttribute(k, v);
    } else if (v === true) node.setAttribute(k, '');
    else if (v !== false && v != null) node.setAttribute(k, v);
  }
  children.flat().forEach(c => {
    if (c == null || c === false) return;
    node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return node;
}

function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function toast(msg, kind = '') {
  const stack = document.getElementById('toastStack');
  const t = el('div', { class: 'toast ' + kind }, msg);
  stack.appendChild(t);
  setTimeout(() => {
    t.style.transition = 'opacity .2s';
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 220);
  }, 2400);
}

function modal({ title, body, onConfirm, confirmLabel, danger }) {
  const back = document.getElementById('modalBackdrop');
  const head = document.getElementById('modalHead');
  const bodyEl = document.getElementById('modalBody');
  const foot = document.getElementById('modalFoot');
  head.textContent = title || '';
  clear(bodyEl);
  if (typeof body === 'string') bodyEl.innerHTML = body;
  else if (body) bodyEl.appendChild(body);
  clear(foot);
  const cancel = el('button', { class: 'btn', onclick: close }, t('cancel'));
  const ok = el('button', { class: 'btn ' + (danger ? 'btn-danger' : 'btn-primary') },
    confirmLabel || t('save'));
  ok.addEventListener('click', () => {
    const result = onConfirm ? onConfirm() : true;
    if (result !== false) close();
  });
  foot.appendChild(cancel);
  foot.appendChild(ok);
  back.classList.add('open');
  setTimeout(() => ok.focus(), 50);
  function close() { back.classList.remove('open'); }
  back.onclick = (e) => { if (e.target === back) close(); };
}

function applyI18nLabels() {
  document.querySelectorAll('[data-i18n]').forEach(n => {
    n.textContent = t(n.getAttribute('data-i18n'));
  });
}

function statusPill(status, reasons) {
  const meta = STATUS_LABELS[status];
  const attrs = { class: 'pill ' + meta.cls };
  if (reasons && reasons.length) {
    attrs.title = reasons.join('\n');
    attrs['aria-label'] = `${t(meta.key)}: ${reasons.join('; ')}`;
  }
  return el('span', attrs, t(meta.key));
}

function render() {

  renderGrid();
  renderConflicts();

  renderSettings();
  applyI18nLabels();

}

function renderPanelHeader({ title, sub, actions }) {
  return el('div', { class: 'panel-header' },
    el('div', {},
      el('div', { class: 'panel-title' }, title),
      sub ? el('div', { class: 'panel-sub' }, sub) : null,
    ),
    el('div', { class: 'panel-actions' }, ...(actions || [])),
  );
}

// ====================================================================
// SCHEDULE
// ====================================================================

function instructorOptions() {
  const names = State.instructors.map(i => i.name);
  State.rows.forEach(r => r.blocks.forEach(b => {
    if (b.instr && !names.includes(b.instr)) names.push(b.instr);
  }));
  return names;
}

function renderSchedule() {
  const panel = document.getElementById('panel-schedule');
  clear(panel);

  panel.appendChild(renderPanelHeader({
    title: t('schedule_title'),
    sub: t('schedule_sub'),
    actions: [
      State.rows.length > 0
        ? el('button', { class: 'btn', onclick: runAutoAllocate }, t('auto_allocate'))
        : null,
      el('button', { class: 'btn btn-primary', onclick: addLevel }, t('add_level')),
    ].filter(Boolean),
  }));

  if (State.levels.length === 0) {
    panel.appendChild(el('div', { class: 'empty' },
      el('div', { class: 'empty-title' }, t('empty_schedule_title')),
      el('div', { class: 'empty-sub' }, t('empty_schedule_sub')),
      el('button', { class: 'btn btn-primary', onclick: addLevel }, t('add_level')),
    ));
    return;
  }

  const { byBlock } = detectConflicts();

  State.levels.forEach(level => {
    panel.appendChild(renderLevel(level, byBlock));
  });
}

function renderLevel(level, conflictBlocks) {
  const sections = State.rows.filter(r => r.levelId === level.id);

  const card = el('div', { class: 'level-section', 'data-level': level.id });

  // Head
  const nameInp = el('input', {
    class: 'level-name-input',
    type: 'text',
    value: level.name,
    placeholder: t('level_name_ph'),
    'aria-label': t('level_name'),
  });
  nameInp.addEventListener('input', (e) => {
    mutateCoalesced(() => { level.name = e.target.value; });
  });

  card.appendChild(el('div', { class: 'level-head' },
    el('div', { class: 'level-title-row' },
      nameInp,
      el('span', { class: 'level-meta' },
        `${sections.length} ${t('sections_count').toLowerCase()}`),
    ),
    el('div', { class: 'level-actions' },
      el('button', {
        class: 'btn btn-sm',
        onclick: () => addSection(level.id),
      }, t('add_section')),
      el('button', {
        class: 'btn btn-sm',
        onclick: () => openBulkAdd(level.id),
      }, t('bulk_add')),
      el('button', {
        class: 'btn btn-sm',
        title: t('auto_allocate'),
        onclick: () => runAutoAllocateLevel(level.id),
      }, t('auto_allocate')),
      el('button', {
        class: 'btn btn-sm btn-ghost',
        title: t('delete'),
        onclick: () => confirmDeleteLevel(level.id),
      }, '✕'),
    ),
  ));

  if (sections.length === 0) {
    card.appendChild(el('div', { style: 'padding:14px 4px; font-size:13px; color:var(--ink-faint);' },
      t('empty_level_sub'),
    ));
  } else {
    sections.forEach(sec => card.appendChild(renderSection(sec, conflictBlocks)));
  }

  return card;
}

function renderSection(section, conflictBlocks) {
  const hasConflict = section.blocks.some(b => conflictBlocks.has(section.id + '|' + b.id));

  const card = el('div', {
    class: 'section-card' + (hasConflict ? ' has-conflict' : ''),
    'data-section': section.id,
  });

  // Head
  card.appendChild(el('div', { class: 'section-head' },
    el('div', { class: 'section-title' },
      el('span', { class: 'section-code' }, section.code || '—'),
      el('span', { class: 'section-name' }, section.name || ''),
    ),
    el('div', { class: 'section-actions' },
      el('button', {
        class: 'btn btn-ghost btn-icon',
        title: t('delete'),
        onclick: () => confirmDeleteSection(section.id),
      }, '✕'),
    ),
  ));

  // Meta
  const grid = el('div', { class: 'row-grid' });
  grid.appendChild(makeField(t('code'), textInput(section, 'code')));
  grid.appendChild(makeField(t('name'), textInput(section, 'name')));
  grid.appendChild(makeField(t('type'), typeSelect(section)));
  grid.appendChild(makeField(t('credits'), numInput(section, 'credits')));
  grid.appendChild(makeField(t('days'), daysSelect(section)));
  card.appendChild(grid);

  // Blocks
  const blocksWrap = el('div', { class: 'blocks-wrap' });
  blocksWrap.appendChild(el('div', { class: 'blocks-header' },
    el('span', { class: 'blocks-label' },
      `${t('blocks_label')} · ${section.blocks.length}`),
    el('button', {
      class: 'btn btn-sm',
      onclick: () => addBlock(section.id),
    }, t('add_block')),
  ));
  const list = el('div', { class: 'blocks-list' });
  section.blocks.forEach((blk, idx) => {
    list.appendChild(renderBlock(section, blk, idx, conflictBlocks));
  });
  blocksWrap.appendChild(list);
  card.appendChild(blocksWrap);

  return card;
}

function makeField(label, input) {
  return el('div', { class: 'field' },
    el('label', { class: 'field-label' }, label),
    input,
  );
}

function textInput(section, key) {
  const inp = el('input', {
    class: 'field-input',
    type: 'text',
    value: section[key] || '',
  });
  inp.addEventListener('input', (e) => {
    mutateCoalesced(() => { section[key] = e.target.value; });
    if (key === 'code' || key === 'name') updateSectionHead(section);
  });
  return inp;
}

function numInput(section, key) {
  const inp = el('input', {
    class: 'field-input',
    type: 'number', min: '0', step: '1',
    value: section[key] != null ? section[key] : '',
  });
  inp.addEventListener('input', (e) => {
    mutateCoalesced(() => { section[key] = parseInt(e.target.value, 10) || 0; });
  });
  return inp;
}

function typeSelect(section) {
  const sel = el('select', { class: 'field-select' });
  TYPES.forEach(typ => {
    const opt = el('option', { value: typ.code }, State.lang === 'ar' ? typ.ar : typ.en);
    if (section.type === typ.code) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => {
      section.type = e.target.value;
      section.blocks.forEach(b => {
        if (!findSlot(section.type, b.time)) b.time = '';
      });
    });
    renderSchedule();
    updateConflictBadge();
  });
  return sel;
}

function daysSelect(section) {
  const sel = el('select', { class: 'field-select' });
  State.config.dayPatterns.forEach(p => {
    const opt = el('option', { value: p.code }, p.label);
    if (section.days === p.code) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => { section.days = e.target.value; });
    refreshAfterEdit();
  });
  return sel;
}

// Per-session collapsed-block tracking (in memory only — resets on reload).
const _collapsedBlocks = new Set();
function toggleBlockCollapse(blockId) {
  if (_collapsedBlocks.has(blockId)) _collapsedBlocks.delete(blockId);
  else _collapsedBlocks.add(blockId);
  renderSchedule();
}

function blockSummaryText(section, block) {
  const days = effectiveDays(section, block) || '—';
  const parts = [days, block.time || '—'];
  if (block.instr) parts.push(block.instr);
  if (block.room) parts.push(block.room);
  return parts.join(' · ');
}

function renderBlock(section, block, idx, conflictBlocks) {
  const status = blockStatus(section, block, conflictBlocks);
  const collapsed = _collapsedBlocks.has(block.id);

  const wrap = el('div', {
    class: 'block' + (collapsed ? ' collapsed' : ''),
    'data-block': block.id,
  });

  const actions = el('div', { class: 'block-actions' });
  if (section.blocks.length > 1) {
    actions.appendChild(el('button', {
      class: 'btn btn-ghost btn-icon',
      title: t('remove'),
      onclick: (e) => { e.stopPropagation(); removeBlock(section.id, block.id); },
    }, '✕'));
  }

  // Clickable header — toggles collapse. Caret hints at the current state.
  const head = el('div', {
    class: 'block-head clickable',
    role: 'button',
    tabindex: '0',
    'aria-expanded': collapsed ? 'false' : 'true',
    title: collapsed ? t('block_open') : t('block_close'),
    onclick: () => toggleBlockCollapse(block.id),
    onkeydown: (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleBlockCollapse(block.id);
      }
    },
  },
    el('span', { class: 'block-name' },
      el('span', { class: 'block-caret' }, collapsed ? '▸' : '▾'),
      ` ${t('block_n')} ${idx + 1}`,
      collapsed
        ? el('span', { class: 'block-summary' }, ' · ' + blockSummaryText(section, block))
        : null,
    ),
    el('div', { class: 'row', style: 'gap:6px;' },
      statusPill(status, _lastConflicts.reasonsByBlock.get(section.id + '|' + block.id)),
      actions),
  );
  wrap.appendChild(head);

  if (!collapsed) {
    const grid = el('div', { class: 'row-grid' });
    grid.appendChild(makeField(t('days_block'), blockDaysSelect(section, block)));
    grid.appendChild(makeField(t('time'),       blockTimeSelect(section, block)));
    grid.appendChild(makeInstrField(block));
    grid.appendChild(makeField(t('room'),       blockRoomInput(block)));
    wrap.appendChild(grid);
  }

  return wrap;
}

// Instructor field with an inline "View week" link that opens the Grid
// pre-filtered for the chosen instructor.
function makeInstrField(block) {
  const sel = blockInstrSelect(block);
  const wrap = el('div', { class: 'field' },
    el('label', { class: 'field-label' }, t('instructor')),
    sel,
  );
  const link = el('button', {
    class: 'view-week-btn',
    type: 'button',
    title: t('view_week'),
    onclick: () => {
      const name = sel.value || '';
      State.gridFilters.instr = name;
      setTab('grid');
    },
  }, '📅');
  wrap.appendChild(link);
  return wrap;
}

function blockTimeSelect(section, block) {
  const sel = el('select', { class: 'field-select' });
  sel.appendChild(el('option', { value: '' }, '—'));
  slotsFor(section.type).forEach(s => {
    const opt = el('option', { value: s.code }, s.code);
    if (block.time === s.code) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => { block.time = e.target.value; });
    refreshAfterEdit();
  });
  return sel;
}

// Per-block days dropdown. Empty value means "inherit from section". The
// first option shows the inherited value so the user can see what's in
// effect without setting an override.
function blockDaysSelect(section, block) {
  const sel = el('select', { class: 'field-select' });
  const inherit = section.days || '—';
  sel.appendChild(el('option', { value: '' },
    `(${t('inherit')} ${inherit})`));
  State.config.dayPatterns.forEach(p => {
    if (!p.code) return;
    const opt = el('option', { value: p.code }, p.label);
    if (block.days === p.code) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => { block.days = e.target.value; });
    refreshAfterEdit();
  });
  return sel;
}

function blockInstrSelect(block) {
  const sel = el('select', { class: 'field-select' });
  sel.appendChild(el('option', { value: '' }, '—'));
  instructorOptions().forEach(name => {
    const opt = el('option', { value: name }, name);
    if (block.instr === name) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', (e) => {
    mutate(() => { block.instr = e.target.value; });
    refreshAfterEdit();
  });
  return sel;
}

function blockRoomInput(block) {
  const inp = el('input', {
    class: 'field-input', type: 'text',
    value: block.room || '', placeholder: '—',
  });
  inp.addEventListener('input', (e) => {
    mutateCoalesced(() => { block.room = e.target.value; });
  });
  inp.addEventListener('change', () => refreshAfterEdit());
  return inp;
}

// ====================================================================
// SCHEDULE: TARGETED UPDATES
// ====================================================================

function updateSectionHead(section) {
  const card = document.querySelector(`[data-section="${section.id}"]`);
  if (!card) return;
  const codeEl = card.querySelector('.section-code');
  const nameEl = card.querySelector('.section-name');
  if (codeEl) codeEl.textContent = section.code || '—';
  if (nameEl) nameEl.textContent = section.name || '';
}

function refreshAfterEdit() {
  const { byBlock, issues } = detectConflicts();
  document.querySelectorAll('.section-card').forEach(card => {
    const id = card.getAttribute('data-section');
    const sec = State.rows.find(r => r.id === id);
    if (!sec) return;
    const has = sec.blocks.some(b => byBlock.has(id + '|' + b.id));
    card.classList.toggle('has-conflict', has);
    sec.blocks.forEach(b => {
      const blkEl = card.querySelector(`[data-block="${b.id}"]`);
      if (!blkEl) return;
      const pill = blkEl.querySelector('.pill');
      if (pill) {
        const np = statusPill(blockStatus(sec, b, byBlock),
          _lastConflicts.reasonsByBlock.get(sec.id + '|' + b.id));
        pill.replaceWith(np);
      }
    });
  });
  setConflictBadge(issues.length);
  if (document.getElementById('panel-conflicts').classList.contains('active')) {
    renderConflicts();
  }
}

function setConflictBadge(n) {
  const b = document.getElementById('conflictBadge');
  b.setAttribute('data-count', String(n));
  b.textContent = String(n);
}

function updateConflictBadge() {
  setConflictBadge(detectConflicts().issues.length);
}

// SCHEDULE: CRUD

function addLevel() {
  mutate(() => { State.levels.push(newLevel('')); });
  renderSchedule();
  updateConflictBadge();
  setTimeout(() => {
    const cards = document.querySelectorAll('#panel-schedule .level-section');
    const last = cards[cards.length - 1];
    const inp = last && last.querySelector('.level-name-input');
    if (inp) inp.focus();
  }, 50);
}

function confirmDeleteLevel(levelId) {
  const lv = State.levels.find(l => l.id === levelId);
  if (!lv) return;
  const count = State.rows.filter(r => r.levelId === levelId).length;
  modal({
    title: t('confirm_delete_level'),
    body: el('div', { style: 'font-size:13px; color:var(--ink-soft);' },
      `${lv.name || '—'} · ${count} ${t('sections_count').toLowerCase()}`,
    ),
    confirmLabel: t('delete'), danger: true,
    onConfirm: () => {
      mutate(() => {
        State.levels = State.levels.filter(l => l.id !== levelId);
        State.rows = State.rows.filter(r => r.levelId !== levelId);
      });
      renderSchedule();
      updateConflictBadge();
    },
  });
}

function addSection(levelId) {
  mutate(() => { State.rows.push(newSection(levelId)); });
  renderSchedule();
  updateConflictBadge();
}

function confirmDeleteSection(sectionId) {
  modal({
    title: t('confirm_delete_section'),
    body: '', confirmLabel: t('delete'), danger: true,
    onConfirm: () => {
      mutate(() => { State.rows = State.rows.filter(r => r.id !== sectionId); });
      renderSchedule();
      updateConflictBadge();
    },
  });
}

// ====================================================================
// AUTO-ALLOCATE — greedy fill of empty block times
// ====================================================================

function runAutoAllocate() { _autoAllocate(null); }
function runAutoAllocateLevel(levelId) { _autoAllocate(levelId); }

// Score a candidate slot against the given (row, block, day):
//   gap penalty for level — minimise gap between consecutive sessions in a
//   level on the same day; instructor — modest reward for spacing (so a
//   single instructor isn't taught back-to-back-to-back).
// Lower score = better. Returns Infinity if conflict.
function scoreSlot(row, block, slot) {
  block.time = slot.code;
  const { byBlock } = detectConflicts();
  const conflict = byBlock.has(row.id + '|' + block.id);
  if (conflict) { block.time = ''; return Infinity; }

  const days = expandDays(row.days);
  const sessions = buildSessions();
  let levelGap = 0;
  let instrLoad = 0;
  days.forEach(day => {
    const lvSesh = sessions.filter(s => s.day === day && s.levelId === row.levelId)
      .sort((a, b) => a.start - b.start);
    for (let i = 1; i < lvSesh.length; i++) {
      const gap = lvSesh[i].start - lvSesh[i - 1].end;
      if (gap > 0) levelGap += gap;
    }
    if (block.instr) {
      const ins = sessions.filter(s => s.day === day && s.instr === block.instr);
      instrLoad += ins.length;
    }
  });
  block.time = '';
  // Heavy weight on level gap; small bias on instructor balance.
  return levelGap * 1.0 + instrLoad * 5;
}

function _autoAllocate(levelIdOrNull) {
  let filled = 0, skipped = 0;
  const targets = levelIdOrNull
    ? State.rows.filter(r => r.levelId === levelIdOrNull)
    : State.rows;
  mutate(() => {
    targets.forEach(r => {
      if (!r.days) { r.blocks.forEach(b => { if (!b.time) skipped++; }); return; }
      r.blocks.forEach(b => {
        if (b.time) return;
        const slots = slotsFor(r.type);
        let bestSlot = null, bestScore = Infinity;
        for (const slot of slots) {
          const sc = scoreSlot(r, b, slot);
          if (sc < bestScore) { bestScore = sc; bestSlot = slot; }
        }
        if (bestSlot && bestScore !== Infinity) {
          b.time = bestSlot.code;
          filled++;
        } else {
          skipped++;
        }
      });
    });
  });
  renderSchedule();
  updateConflictBadge();
  if (filled === 0 && skipped === 0) {
    toast(t('auto_allocate_none'), 'warn');
  } else {
    const msg = t('auto_allocate_done').replace('{filled}', filled).replace('{skipped}', skipped);
    toast(msg, filled > 0 ? 'ok' : 'warn');
  }
}

function openBulkAdd(levelId) {
  const lv = State.levels.find(l => l.id === levelId);
  if (!lv) return;
  const ta = el('textarea', {
    placeholder: 'CECS-211, Programming Fundamentals, lecture, 3, M,W',
    style: 'width:100%; min-height:160px; font-family:Geist Mono, monospace; font-size:12px; padding:8px; border:1px solid var(--rule); border-radius:6px;',
  });
  const help = el('div', {
    style: 'font-size:12px; color:var(--ink-faint); margin-bottom:10px;',
  }, t('bulk_add_help'));
  modal({
    title: `${t('bulk_add_title')} · ${lv.name || '—'}`,
    body: el('div', {}, help, ta),
    confirmLabel: t('bulk_add'),
    onConfirm: () => {
      const lines = (ta.value || '').split('\n').map(l => l.trim()).filter(Boolean);
      if (lines.length === 0) return false;
      const added = [];
      lines.forEach(line => {
        // Split on tabs first; if none, split on commas (taking the first 5 fields,
        // and assume any extra commas belong to the days field).
        let parts;
        if (line.includes('\t')) parts = line.split('\t').map(s => s.trim());
        else {
          // Comma split: code, name, type, credits, days(may contain commas)
          const m = line.split(',').map(s => s.trim());
          if (m.length <= 5) parts = m;
          else parts = [m[0], m[1], m[2], m[3], m.slice(4).join(',')];
        }
        const [code, name, type, credits, days] = parts;
        const sec = newSection(levelId);
        sec.code = code || '';
        sec.name = name || '';
        sec.type = ['lecture','lab','online'].includes((type||'').toLowerCase()) ? type.toLowerCase() : 'lecture';
        sec.credits = parseInt(credits, 10) || 0;
        sec.days = days || '';
        added.push(sec);
      });
      mutate(() => { added.forEach(s => State.rows.push(s)); });
      renderSchedule();
      updateConflictBadge();
      toast(t('bulk_add_added').replace('{n}', added.length), 'ok');
    },
  });
}

const GRID_DAYS = ['U', 'M', 'T', 'W', 'R'];
const DAY_LABEL = { U: 'Sun', M: 'Mon', T: 'Tue', W: 'Wed', R: 'Thu' };

// Combined slot list, sorted by start time (lecture + lab interleaved).
function allSlotsSorted() {
  // Combine all three slot kinds; dedupe by code (so a slot defined in
  // multiple kinds shows up as a single grid row labelled with each kind).
  const byCode = new Map();
  const add = (s, kind) => {
    const cur = byCode.get(s.code);
    if (cur) {
      if (!cur.kinds.includes(kind)) cur.kinds.push(kind);
    } else {
      byCode.set(s.code, { ...s, kinds: [kind], kind });
    }
  };
  State.config.lectureSlots.forEach(s => add(s, 'lecture'));
  State.config.labSlots.forEach(s => add(s, 'lab'));
  State.config.onlineSlots.forEach(s => add(s, 'online'));
  const merged = Array.from(byCode.values());
  merged.forEach(s => { s.kind = s.kinds.join('+'); });
  merged.sort((a, b) => a.start - b.start || a.end - b.end);
  return merged;
}

function uniqueRooms() {
  const set = new Set();
  State.rows.forEach(r => r.blocks.forEach(b => { if (b.room) set.add(b.room); }));
  return Array.from(set).sort();
}

function renderGrid() {
  const panel = document.getElementById('panel-grid');
  clear(panel);
  panel.appendChild(renderPanelHeader({
    title: t('grid_title'), sub: t('grid_sub'),
  }));

  // Filter bar
  const filters = State.gridFilters;
  const instrs = instructorOptions().sort();
  const levels = State.levels.map(l => l.name).filter(Boolean);
  const rooms = uniqueRooms();
  const types = TYPES.map(x => x.code);

  const buildSelect = (id, options, label, selected) => {
    const sel = el('select', { id });
    sel.appendChild(el('option', { value: '' }, t('grid_all')));
    options.forEach(o => {
      const opt = el('option', { value: o },
        (label === 'type' ? (TYPES.find(tx => tx.code === o) || {})[State.lang === 'ar' ? 'ar' : 'en'] || o : o));
      if (o === selected) opt.selected = true;
      sel.appendChild(opt);
    });
    return sel;
  };

  const fInstr = buildSelect('fInstr', instrs, 'instr', filters.instr);
  const fLevel = buildSelect('fLevel', levels, 'level', filters.level);
  const fRoom = buildSelect('fRoom', rooms, 'room', filters.room);
  const fType = buildSelect('fType', types, 'type', filters.type);

  [fInstr, fLevel, fRoom, fType].forEach((sel, i) => {
    sel.addEventListener('change', () => {
      const k = ['instr','level','room','type'][i];
      State.gridFilters[k] = sel.value;
      renderGrid();
    });
  });

  panel.appendChild(el('div', { class: 'grid-filters' },
    el('div', { class: 'grid-filter' }, el('label', {}, t('grid_filter_instr')), fInstr),
    el('div', { class: 'grid-filter' }, el('label', {}, t('grid_filter_level')), fLevel),
    el('div', { class: 'grid-filter' }, el('label', {}, t('grid_filter_room')),  fRoom),
    el('div', { class: 'grid-filter' }, el('label', {}, t('grid_filter_type')),  fType),
  ));

  // Build the grid
  const sessions = buildSessions();
  const { byBlock } = detectConflicts();
  const slotsAll = allSlotsSorted();

  const matches = (s) => {
    if (filters.instr && s.instr !== filters.instr) return false;
    if (filters.level) {
      const lv = State.levels.find(l => l.id === s.levelId);
      if (!lv || lv.name !== filters.level) return false;
    }
    if (filters.room && s.room !== filters.room) return false;
    if (filters.type && s.type !== filters.type) return false;
    return true;
  };

  // Index sessions by (day, slotCode)
  const byCell = new Map();
  sessions.filter(matches).forEach(s => {
    const key = s.day + '|' + s.slotCode;
    if (!byCell.has(key)) byCell.set(key, []);
    byCell.get(key).push(s);
  });

  // Should empty cells say "FREE"? Only when an instructor (or room) filter is set.
  const showFree = !!(filters.instr || filters.room);

  const tableEl = el('div', { class: 'grid-table' });

  // Header row
  const head = el('div', { class: 'grid-row' });
  head.appendChild(el('div', { class: 'grid-cell head' }, ''));
  GRID_DAYS.forEach(d => head.appendChild(el('div', { class: 'grid-cell head' }, DAY_LABEL[d] + ' (' + d + ')')));
  tableEl.appendChild(head);

  // Slot rows
  slotsAll.forEach(slot => {
    const row = el('div', { class: 'grid-row' });
    const timeCell = el('div', { class: 'grid-cell time' + (slot.kind === 'lab' ? ' time-lab' : '') });
    timeCell.appendChild(el('div', { class: 'mono' }, slot.code));
    timeCell.appendChild(el('div', { style: 'font-size:10px; opacity:.7;' }, slot.kind));
    row.appendChild(timeCell);

    GRID_DAYS.forEach(day => {
      const cellSessions = byCell.get(day + '|' + slot.code) || [];
      let cls = 'grid-cell';
      if (cellSessions.length === 0) {
        if (showFree) cls += ' free';
        const cell = el('div', { class: cls }, showFree ? t('grid_free') : '');
        row.appendChild(cell);
        return;
      }
      const isConflict = cellSessions.some(s => byBlock.has(s.rowId + '|' + s.blockId));
      cls += isConflict ? ' conflict' : ' busy';
      const cell = el('div', { class: cls });
      cellSessions.forEach(s => {
        const lvName = (State.levels.find(l => l.id === s.levelId) || {}).name || '';
        const sub = filters.instr
          ? `${lvName} · ${s.room || '—'}`
          : (s.instr || '—') + (s.room ? ' · ' + s.room : '');
        const tip = `${s.code} · ${s.name || ''}\n${lvName}\n${s.instr || '(no instructor)'}\n${s.room || '(no room)'}\nDays: ${s.days}`;
        const card = el('div', { class: 'grid-session', title: tip },
          el('div', { class: 'grid-session-code' }, `${s.code || '?'} · B${s.blockIdx + 1}`),
          el('div', { class: 'grid-session-sub' }, sub),
        );
        cell.appendChild(card);
      });
      row.appendChild(cell);
    });
    tableEl.appendChild(row);
  });

  panel.appendChild(tableEl);

  // Legend
  panel.appendChild(el('div', { class: 'grid-legend' },
    el('span', {}, el('span', { class: 'legend-swatch', style: 'background:var(--status-info-bg); border:1px solid var(--status-info);' }), t('grid_legend_busy')),
    el('span', {}, el('span', { class: 'legend-swatch', style: 'background:var(--status-bad-bg); border:1px solid var(--status-bad);' }), t('grid_legend_conflict')),
    showFree ? el('span', {}, el('span', { class: 'legend-swatch', style: 'background:var(--card-tint); border:1px dashed var(--rule);' }), t('grid_legend_free')) : null,
  ));
}

    });

  }

  setConflictBadge(issues.length);
}

// Compute a possible resolution for one conflict.
// Returns { label, apply } or null when no automatic fix is found.
function suggestFix(iss) {
  // Pick block "b" (the second one) as the candidate to move; try each
  // alternative slot to see which clears its conflicts.
  const [bRowId, bBlockId] = iss.b.split('|');
  const row = State.rows.find(r => r.id === bRowId);
  if (!row) return null;
  const blk = row.blocks.find(x => x.id === bBlockId);
  if (!blk) return null;
  const original = blk.time;
  const slots = slotsFor(row.type);
  for (const slot of slots) {
    if (slot.code === original) continue;
    blk.time = slot.code;
    const { byBlock } = detectConflicts();
    if (!byBlock.has(row.id + '|' + blk.id)) {
      blk.time = original; // restore
      return {
        label: `${row.code || row.name} B${row.blocks.indexOf(blk) + 1} → ${slot.code}`,
        apply: () => {
          mutate(() => { blk.time = slot.code; });
          render();
          toast(t('suggestion_applied'), 'ok');
        },
      };
    }
    blk.time = original;
  }
  return null;
}

function minToHHMM(m) {
  const h = Math.floor(m / 60), mm = m % 60;
  return String(h).padStart(2, '0') + ':' + String(mm).padStart(2, '0');
}
function hhmmToMin(s) {
  if (!s) return null;
  const [h, m] = s.split(':').map(x => parseInt(x, 10));
  if (Number.isNaN(h) || Number.isNaN(m)) return null;
  return h * 60 + m;
}
function slotCodeFromMins(start, end) {
  const fmt = (m) => {
    const h = Math.floor(m / 60), mm = m % 60;
    return String(h).padStart(2, '0') + String(mm).padStart(2, '0');
  };
  return fmt(start) + '-' + fmt(end);
}

function renderCourses() {
  const panel = document.getElementById('panel-courses');
  clear(panel);
  panel.appendChild(renderPanelHeader({
    title: t('courses_title'), sub: t('courses_sub'),
  }));

  const map = new Map();
  State.rows.forEach(r => {
    const k = (r.code || '(no code)') + '|' + r.type;
    if (!map.has(k)) {
      map.set(k, {
        code: r.code, name: r.name, type: r.type, credits: r.credits,
        levels: new Set(), sections: 0, blocks: 0,
      });
    }
    const c = map.get(k);
    if (r.levelId) c.levels.add(r.levelId);
    c.sections++;
    c.blocks += r.blocks.length;
  });

  if (map.size === 0) {
    panel.appendChild(el('div', { class: 'empty' },
      el('div', { class: 'empty-title' }, t('no_courses')),
    ));
    return;
  }

  const tbl = el('table', { class: 'data' });
  tbl.appendChild(el('thead', {}, el('tr', {},
    el('th', {}, t('code')),
    el('th', {}, t('name')),
    el('th', {}, t('type')),
    el('th', {}, t('credits')),
    el('th', {}, t('sections_count')),
    el('th', {}, t('blocks_count')),
  )));
  const tbody = el('tbody');
  Array.from(map.entries()).forEach(([key, c]) => {
    const [origCode, origType] = key.split('|');

    // Editable code: rename ALL sections that share (code+type) → keeps the
    // course catalog the source of truth.
    const codeInp = el('input', { class: 'field-input mono', type: 'text', value: c.code || '' });
    codeInp.addEventListener('change', (e) => {
      const v = e.target.value.trim();
      if (v === c.code) return;
      mutate(() => {
        State.rows.forEach(r => { if (r.code === origCode && r.type === origType) r.code = v; });
      });
      render();
    });

    const nameInp = el('input', { class: 'field-input', type: 'text', value: c.name || '' });
    nameInp.addEventListener('change', (e) => {
      const v = e.target.value.trim();
      if (v === c.name) return;
      mutate(() => {
        State.rows.forEach(r => { if (r.code === origCode && r.type === origType) r.name = v; });
      });
      render();
    });

    const typeSel = el('select', { class: 'field-select' });
    TYPES.forEach(typ => {
      const opt = el('option', { value: typ.code }, State.lang === 'ar' ? typ.ar : typ.en);
      if (c.type === typ.code) opt.selected = true;
      typeSel.appendChild(opt);
    });
    typeSel.addEventListener('change', (e) => {
      const v = e.target.value;
      mutate(() => {
        State.rows.forEach(r => {
          if (r.code === origCode && r.type === origType) {
            r.type = v;
            r.blocks.forEach(b => { if (!findSlot(v, b.time)) b.time = ''; });
          }
        });
      });
      render();
    });

    const creditsInp = el('input', { class: 'field-input mono', type: 'number', min: '0', value: String(c.credits || 0) });
    creditsInp.addEventListener('change', (e) => {
      const v = parseInt(e.target.value, 10) || 0;
      mutate(() => {
        State.rows.forEach(r => { if (r.code === origCode && r.type === origType) r.credits = v; });
      });
      renderCourses();
    });

    tbody.appendChild(el('tr', {},
      el('td', { style: 'min-width:140px;' }, codeInp),
      el('td', {}, nameInp),
      el('td', { style: 'min-width:130px;' }, typeSel),

      el('td', { class: 'mono' }, String(c.sections)),
      el('td', { class: 'mono' }, String(c.blocks)),

  });
  tbl.appendChild(tbody);
  panel.appendChild(el('div', { class: 'table-wrap' }, tbl));
}

const EXPORT_HEADERS = [
  'level', 'code', 'name', 'type', 'credits', 'days',
  'block', 'time', 'instr', 'room',
];

function flattenForExport() {
  const out = [];
  State.rows.forEach(r => {
    const lv = State.levels.find(l => l.id === r.levelId);
    const lvName = lv ? lv.name : '';
    r.blocks.forEach((b, i) => {
      out.push({
        level: lvName,
        code: r.code, name: r.name, type: r.type, credits: r.credits, days: r.days,
        block: i + 1,
        time: b.time, instr: b.instr, room: b.room,
      });
    });
    if (r.blocks.length === 0) {
      out.push({
        level: lvName,
        code: r.code, name: r.name, type: r.type, credits: r.credits, days: r.days,
        block: 0, time: '', instr: '', room: '',
      });
    }
  });
  return out;
}

function escapeCSV(v, sep) {
  if (v == null) return '';
  const s = String(v);
  if (s.includes(sep) || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function toCSV(sep) {
  const flat = flattenForExport();
  const lines = [EXPORT_HEADERS.map(h => escapeCSV(h, sep)).join(sep)];
  flat.forEach(r => lines.push(EXPORT_HEADERS.map(h => escapeCSV(r[h], sep)).join(sep)));
  return lines.join('\n');
}

function download(filename, content, mime) {
  const blob = new Blob(['﻿' + content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

// Wide CSV: matches the spreadsheet layout in the reference image.
// One row per section, with block1_*, block2_*, block3_*... columns.
const WIDE_BASE = ['level', 'code', 'name', 'type', 'credits', 'days'];
function widePerBlockHeaders(n) {
  const out = [];
  for (let i = 1; i <= n; i++) {
    out.push(`block${i}_time`, `block${i}_instr`, `block${i}_room`);
  }
  return out;
}
function maxBlocks() {
  return State.rows.reduce((m, r) => Math.max(m, r.blocks.length), 0) || 2;
}
function toWideCSV(sep, fixedBlocks) {
  const n = fixedBlocks || maxBlocks();
  const headers = WIDE_BASE.concat(widePerBlockHeaders(n));
  const lines = [headers.map(h => escapeCSV(h, sep)).join(sep)];
  State.rows.forEach(r => {
    const lv = State.levels.find(l => l.id === r.levelId);
    const row = {
      level: lv ? lv.name : '',
      code: r.code, name: r.name, type: r.type,
      credits: r.credits, days: r.days,
    };
    for (let i = 1; i <= n; i++) {
      const b = r.blocks[i - 1] || { time: '', instr: '', room: '' };
      row[`block${i}_time`]  = b.time;
      row[`block${i}_instr`] = b.instr;
      row[`block${i}_room`]  = b.room;
    }
    lines.push(headers.map(h => escapeCSV(row[h], sep)).join(sep));
  });
  return lines.join('\n');
}
